<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--rojo:#e63946;--amarillo:#f4d35e;--verde:#2dc653;--naranja:#ff6b2b;--oscuro:#1a1a2e;--sombra:0 4px 20px rgba(0,0,0,0.12);--bg:#f7f7f7;--card:#fff;--text:#1a1a2e;--subtext:#888;--border:#eee;--gris:#f1f1f1;--anim:0.2s cubic-bezier(0.34,1.56,0.64,1);}
.dark{--bg:#0f0f1a;--card:#1a1a2e;--text:#f0f0f0;--subtext:#aaa;--border:#2a2a3e;--gris:#2a2a3e;}
*{box-sizing:border-box;margin:0;padding:0;}
/* Reduced motion */
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none;}
/* Safe area para iPhone */
header{background:var(--oscuro);color:white;padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--amarillo);line-height:1;}
.logo span{color:var(--rojo);}
.dark-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:4px;border-radius:50%;transition:background 0.2s;}
.dark-btn:hover{background:rgba(255,255,255,0.1);}
.cart-btn{background:var(--rojo);color:white;border:none;border-radius:50px;padding:9px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:transform var(--anim),box-shadow 0.2s;box-shadow:0 4px 12px rgba(230,57,70,0.4);}
.cart-btn:active{transform:scale(0.92);}
.cart-count{background:var(--amarillo);color:var(--oscuro);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;transition:transform var(--anim);}
.cart-count.bump{animation:bump 0.35s var(--anim);}
@keyframes bump{0%{transform:scale(1)}50%{transform:scale(1.5)}100%{transform:scale(1)}}
.tienda-cerrada-bar{background:linear-gradient(90deg,#e63946,#c1121f);color:white;text-align:center;padding:10px 16px;font-size:13px;font-weight:700;display:none;}
.envio-bar{background:linear-gradient(90deg,#2dc653,#1a9e3f);color:white;text-align:center;padding:8px 16px;font-size:13px;font-weight:700;transition:background 0.3s;}
.tabs{display:flex;background:var(--card);border-bottom:3px solid var(--amarillo);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:11px 16px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:var(--subtext);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all 0.2s;}
.tab-btn.active{color:var(--rojo);border-bottom-color:var(--rojo);}
.search-wrap{padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);position:relative;}
.search-wrap input{width:100%;padding:10px 16px 10px 38px;border:2px solid var(--border);border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;background:var(--bg);color:var(--text);transition:border 0.2s,box-shadow 0.2s;}
.search-wrap input:focus{border-color:var(--rojo);box-shadow:0 0 0 3px rgba(230,57,70,0.15);}
.search-wrap::before{content:'🔍';position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:15px;}
.view{display:none;padding:14px;animation:fadeIn 0.2s ease;}
.view.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text);margin:16px 0 10px;padding-left:8px;border-left:3px solid var(--amarillo);}
.ofertas-banner{background:linear-gradient(135deg,#e63946,#ff6b2b);border-radius:16px;padding:16px;margin-bottom:16px;color:white;display:flex;align-items:center;justify-content:space-between;}
.ofertas-banner .title{font-family:'Bebas Neue',sans-serif;font-size:26px;}
.scroll-row{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.scroll-row::-webkit-scrollbar{display:none;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;}
.product-card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--sombra);display:flex;flex-direction:column;position:relative;transition:transform 0.15s,box-shadow 0.15s;}
.product-card:active{transform:scale(0.97);box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.oferta-card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--sombra);flex-shrink:0;width:160px;position:relative;}
/* Lazy loading skeleton */
.product-img{width:100%;height:130px;object-fit:cover;transition:opacity 0.3s;}
.product-img.loading{background:linear-gradient(90deg,var(--gris) 25%,var(--border) 50%,var(--gris) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.oferta-card .product-img{height:110px;}
.product-emoji-big{font-size:46px;text-align:center;padding:14px 0 6px;}
.product-info{padding:8px 12px 12px;flex:1;display:flex;flex-direction:column;gap:5px;}
.product-name{font-weight:700;font-size:13px;color:var(--text);line-height:1.3;}
.product-price{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--rojo);}
.price-old{font-size:12px;color:var(--subtext);text-decoration:line-through;}
.price-new{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--verde);}
.price-save{font-size:11px;font-weight:700;color:var(--verde);}
.badge{position:absolute;top:8px;left:8px;border-radius:50px;padding:3px 9px;font-size:11px;font-weight:800;z-index:2;}
.badge-oferta{background:var(--rojo);color:white;}
.badge-popular{background:var(--naranja);color:white;}
.badge-recomendado{background:var(--verde);color:white;}
.badge-combo{background:#7b2ff7;color:white;}
.badge-hoy{background:linear-gradient(90deg,#e63946,#ff6b2b);color:white;}
.cat-badge{position:absolute;top:8px;right:8px;background:var(--amarillo);color:var(--oscuro);border-radius:50px;padding:2px 8px;font-size:10px;font-weight:700;z-index:2;}
.add-btn{background:var(--oscuro);color:white;border:none;border-radius:50px;padding:8px 14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;width:100%;margin-top:auto;transition:background 0.2s,transform var(--anim);}
.add-btn:active{transform:scale(0.95);background:var(--rojo);}
.quick-btn{background:var(--rojo);color:white;border:none;border-radius:50px;padding:6px 10px;font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;cursor:pointer;width:100%;margin-top:4px;transition:transform var(--anim);}
.quick-btn:active{transform:scale(0.95);}
.agotado-badge{background:#555;color:white;border:none;border-radius:50px;padding:8px 14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;width:100%;margin-top:auto;text-align:center;opacity:0.8;}
.qty-ctrl{display:flex;align-items:center;gap:8px;width:100%;justify-content:center;margin-top:auto;}
.qty-btn{background:var(--gris);border:none;border-radius:50%;width:30px;height:30px;font-size:18px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s,transform var(--anim);}
.qty-btn:active{background:var(--amarillo);transform:scale(0.88);}
.qty-num{font-weight:800;font-size:16px;min-width:20px;text-align:center;}
.variants-label{font-size:11px;font-weight:700;color:var(--subtext);}
.variants-list{display:flex;flex-wrap:wrap;gap:4px;}
.variant-chip{padding:3px 9px;border:2px solid var(--border);border-radius:50px;font-size:11px;font-weight:700;cursor:pointer;background:var(--card);color:var(--text);transition:all 0.15s;}
.variant-chip.selected{border-color:var(--rojo);background:#fff0f0;color:var(--rojo);}
.in-cart-badge{font-size:12px;font-weight:700;color:var(--verde);text-align:center;margin-top:auto;}
.cat-filter{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none;}
.cat-filter::-webkit-scrollbar{display:none;}
.cat-chip{flex-shrink:0;padding:7px 14px;border-radius:50px;border:2px solid var(--border);background:var(--card);color:var(--subtext);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;transition:all 0.2s;}
.cat-chip.active{border-color:var(--rojo);background:var(--rojo);color:white;}
.empty{text-align:center;padding:40px 20px;color:var(--subtext);}
.empty-icon{font-size:60px;margin-bottom:12px;}
.cart-item{background:var(--card);border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px;box-shadow:var(--sombra);margin-bottom:10px;animation:slideIn 0.2s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
.cart-item .thumb{width:48px;height:48px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.cart-item .cemoji{font-size:28px;flex-shrink:0;}
.cart-item .info{flex:1;min-width:0;}
.cart-item .info .name{font-weight:700;font-size:13px;}
.cart-item .info .variant{font-size:11px;color:var(--subtext);}
.cart-item .info .price{color:var(--rojo);font-weight:700;font-size:13px;}
.cart-total{background:var(--oscuro);color:white;border-radius:16px;padding:18px;margin:14px 0;text-align:center;}
.cart-total .label{font-size:13px;opacity:0.7;}
.cart-total .amount{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--amarillo);letter-spacing:2px;}
.delivery-options{display:flex;gap:10px;margin:12px 0;}
.delivery-opt{flex:1;padding:12px;border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;font-weight:700;font-size:14px;background:var(--card);color:var(--text);transition:all 0.2s;}
.delivery-opt.selected{border-color:var(--rojo);background:#fff0f0;color:var(--rojo);}
.delivery-opt .icon{font-size:26px;display:block;margin-bottom:4px;}
.zona-chip{flex:1;padding:10px;border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;font-weight:700;font-size:13px;background:var(--card);color:var(--text);transition:all 0.2s;}
.zona-chip.selected{border-color:var(--verde);background:#e8f5e9;color:#1b5e20;}
.metodo-chip{flex:1;padding:10px;border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;font-weight:700;font-size:13px;background:var(--card);color:var(--text);transition:all 0.2s;}
.metodo-chip.selected{border-color:var(--rojo);background:#fff0f0;color:var(--rojo);}
.customer-info input,.customer-info select{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;margin-bottom:10px;outline:none;background:var(--bg);color:var(--text);transition:border 0.2s,box-shadow 0.2s;}
.customer-info input:focus,.customer-info select:focus{border-color:var(--rojo);box-shadow:0 0 0 3px rgba(230,57,70,0.15);}
.customer-info input.field-error{border-color:var(--rojo);background:#fff5f5;animation:shake 0.3s;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.whatsapp-btn{background:#25d366;color:white;border:none;border-radius:14px;padding:16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;transition:transform var(--anim),box-shadow 0.2s;box-shadow:0 4px 16px rgba(37,211,102,0.4);}
.whatsapp-btn:not(:disabled):active{transform:scale(0.97);}
.whatsapp-btn:disabled{background:#aaa;cursor:not-allowed;opacity:0.7;box-shadow:none;}
.comprobante-area{width:100%;height:110px;border:2px dashed var(--amarillo);border-radius:14px;background:#fff8e1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-weight:700;color:#999;font-size:13px;overflow:hidden;cursor:pointer;}
.pago-card{background:#fff8e1;border:2px solid var(--amarillo);border-radius:14px;padding:14px;margin-top:12px;}
.instruc-card{border-radius:14px;padding:14px;margin-top:10px;}
.geo-required{border:2px solid var(--verde);border-radius:12px;padding:12px;background:#e8f5e9;margin-bottom:10px;}
.geo-required.geo-ok{background:#e8f5e9;border-color:#2dc653;}
.geo-required.geo-pending{background:#fff8e1;border-color:#f4d35e;}
.ux-info-bar{background:linear-gradient(90deg,#e8f5e9,#fff8e1);border:1px solid #ddd;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;color:#555;text-align:center;margin-bottom:10px;}
.minimo-bar{border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;text-align:center;margin-bottom:8px;}
.minimo-ok{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7;}
.minimo-nok{background:#fff3cd;color:#856404;border:1px solid #ffd54f;}
/* Loading spinner */
.spinner{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:white;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* Soporte */
.soporte-form{background:var(--card);border-radius:16px;padding:18px;box-shadow:var(--sombra);}
.soporte-form select,.soporte-form textarea,.soporte-form input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;margin-bottom:10px;outline:none;background:var(--bg);color:var(--text);transition:border 0.2s;}
.soporte-form select:focus,.soporte-form textarea:focus,.soporte-form input:focus{border-color:var(--rojo);}
.soporte-form textarea{min-height:90px;resize:none;}
.soporte-btn{background:var(--rojo);color:white;border:none;border-radius:12px;padding:14px;width:100%;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:transform var(--anim);}
.soporte-btn:active{transform:scale(0.97);}
/* Toast mejorado */
.toast{position:fixed;bottom:max(24px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(80px);background:var(--oscuro);color:white;padding:12px 24px;border-radius:50px;font-weight:700;font-size:14px;z-index:999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;pointer-events:none;box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.toast.show{transform:translateX(-50%) translateY(0);}
/* Zoom modal */
.zoom-modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease;}
.zoom-modal img{max-width:100%;max-height:65vh;border-radius:16px;object-fit:contain;}
.zoom-emoji{font-size:110px;}
.zoom-name{color:white;font-weight:800;font-size:18px;margin-top:14px;text-align:center;}
.zoom-price{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--amarillo);margin-top:2px;}
.zoom-close{margin-top:18px;background:white;border:none;border-radius:50px;padding:12px 30px;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:transform var(--anim);}
.zoom-close:active{transform:scale(0.95);}
/* Barra flotante */
.floating-cart{position:fixed;bottom:0;left:0;right:0;z-index:300;padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:var(--oscuro);display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,0.25);transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.floating-cart.visible{transform:translateY(0);}
.floating-cart-info{flex:1;}
.floating-cart-total{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--amarillo);letter-spacing:1px;}
.floating-cart-label{font-size:11px;color:#aaa;}
.floating-cart-btn{background:var(--rojo);color:white;border:none;border-radius:50px;padding:12px 22px;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;white-space:nowrap;transition:transform var(--anim);}
.floating-cart-btn:active{transform:scale(0.95);}
body.has-float-bar .view{padding-bottom:80px;}
/* Upsell */
.upsell-section{background:linear-gradient(135deg,#fff8e1,#fff3e0);border:2px solid var(--amarillo);border-radius:14px;padding:14px;margin-top:12px;}
.upsell-title{font-size:13px;font-weight:800;color:#856404;margin-bottom:10px;}
.upsell-scroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.upsell-scroll::-webkit-scrollbar{display:none;}
.upsell-card{flex-shrink:0;width:120px;background:white;border-radius:12px;padding:8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.upsell-card .uadd{background:var(--oscuro);color:white;border:none;border-radius:50px;padding:4px 10px;font-size:11px;font-weight:800;cursor:pointer;margin-top:4px;width:100%;transition:background 0.2s;}
/* Repetir pedido */
.repeat-bar{background:linear-gradient(90deg,#1a1a2e,#2a2a4e);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
.repeat-bar-btn{background:var(--amarillo);color:var(--oscuro);border:none;border-radius:50px;padding:8px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap;}
/* Nuevas mejoras */
.tienda-status-bar{text-align:center;padding:10px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;}
.tienda-abierta{background:linear-gradient(90deg,#2dc653,#1a9e3f);color:white;}
.tienda-cerrada{background:linear-gradient(90deg,#e63946,#c1121f);color:white;}
.envio-progress{height:4px;background:rgba(255,255,255,0.3);border-radius:2px;margin-top:4px;}
.envio-progress-bar{height:100%;background:white;border-radius:2px;transition:width 0.5s ease;}
.stock-badge{font-size:10px;font-weight:700;color:var(--naranja);margin-top:2px;}
.share-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:2px 4px;opacity:0.6;transition:opacity 0.2s;}
.share-btn:active{opacity:1;}
.historial-card{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--sombra);margin-bottom:10px;animation:slideIn 0.2s ease;}
.historial-estado{font-size:11px;font-weight:800;padding:3px 9px;border-radius:50px;}
.cupon-input-wrap{display:flex;gap:8px;margin-bottom:10px;}
.cupon-input-wrap input{flex:1;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;background:var(--bg);color:var(--text);transition:border 0.2s;}
.cupon-input-wrap input:focus{border-color:var(--amarillo);}
.cupon-btn{background:var(--amarillo);color:var(--oscuro);border:none;border-radius:10px;padding:10px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap;}
.cupon-ok{background:#e8f5e9;border:2px solid var(--verde);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;color:#1b5e20;margin-bottom:8px;}
.puntos-bar{background:linear-gradient(90deg,#7b2ff7,#5c1dc4);color:white;border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.puntos-num{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;}
/* ARIA focus visible */
:focus-visible{outline:3px solid var(--rojo);outline-offset:2px;border-radius:4px;}
/* High contrast */
@media(prefers-contrast:high){.product-card{border:2px solid var(--text);}button{border:2px solid currentColor;}}
@media(max-width:400px){.products-grid{grid-template-columns:repeat(2,1fr);}.logo{font-size:22px;}}

/* Tracking / Seguimiento de pedido */
.tracking-progress{display:flex;gap:2px;margin:12px 0;}
.tracking-progress-seg{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background 0.3s;}
.tracking-progress-seg.done{background:var(--verde);}
.tracking-progress-seg.active{background:var(--amarillo);}
.tracking-progress-seg.cancel{background:var(--rojo);}

</style>

<body>

<header>
  <div>
    <div class="logo">Bodega <span>Tony</span> Tony</div>
    <div style="font-size:11px;color:#aaa;margin-top:1px;">🛒 Haz tu pedido aquí</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="dark-btn" id="darkBtn" onclick="toggleDark()" aria-label="Cambiar modo oscuro">🌙</button>
    <button class="cart-btn" onclick="showTab('carrito')" aria-label="Ver carrito de compras">
      🛒 <span class="cart-count" id="cartCount" aria-live="polite">0</span>
    </button>
  </div>
</header>

<div class="tienda-cerrada-bar" id="tiendaCerradaBar">⏰ Estamos cerrados. Vuelve en horario de atención</div>
<div class="envio-bar" id="envioBar">🛵 Domicilio gratis</div>

<div class="tabs" role="tablist" aria-label="Secciones de la tienda">
  <button class="tab-btn active" onclick="showTab('tienda')" id="tab-tienda" role="tab" aria-selected="true" aria-controls="view-tienda">🏪 Tienda</button>
  <button class="tab-btn" onclick="showTab('carrito')" id="tab-carrito" role="tab" aria-selected="false" aria-controls="view-carrito">🛒 Mi Pedido</button>
  <button class="tab-btn" onclick="showTab('tracking')" id="tab-tracking" role="tab" aria-selected="false" aria-controls="view-tracking">📦 Pedido</button>
  <button class="tab-btn" onclick="showTab('historial')" id="tab-historial" role="tab" aria-selected="false" aria-controls="view-historial">📋 Mis Pedidos</button>
  <button class="tab-btn" onclick="showTab('soporte')" id="tab-soporte" role="tab" aria-selected="false" aria-controls="view-soporte">❗ Soporte</button>
</div>

<div class="search-wrap" id="searchWrap">
  <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="renderStore()">
</div>

<div class="view active" id="view-tienda"><div id="storeContainer"></div></div>
<div class="view" id="view-carrito"><div id="cartContainer"></div></div>
<div class="view" id="view-tracking"><div id="trackingContainer"></div></div>
<div class="view" id="view-historial"><div id="historialContainer"></div></div>
<div class="view" id="view-soporte"><div id="soporteContainer"></div></div>

<!-- 5. BARRA FLOTANTE -->
<div class="floating-cart" id="floatingCart">
  <div class="floating-cart-info">
    <div class="floating-cart-label">Tu pedido</div>
    <div class="floating-cart-total" id="floatTotal">$ 0.00</div>
  </div>
  <button class="floating-cart-btn" onclick="showTab('carrito')">Ver pedido 🛒</button>
</div>

<div class="toast" id="toast"></div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBdv2cOMgbeBuW-V9Buz8EzGAoElnvySoI",
  authDomain:"bodegatonytony.firebaseapp.com",
  projectId:"bodegatonytony",
  storageBucket:"bodegatonytony.firebasestorage.app",
  messagingSenderId:"763208241886",
  appId:"1:763208241886:web:dd4a04d68c2c72ed24a84f"
});
const db = firebase.firestore();

// ── ESTADO GLOBAL ──
let products       = [];
let cart           = {};
let deliveryType   = 'domicilio';
let selectedCategory = 'Todos';
let comprobanteBase64 = '';
let darkMode       = localStorage.getItem('darkMode') === '1';
let config         = {
  whatsapp: '+584242520138',
  metodosPago: { efectivo: true, pagoMovil: true, transferencia: false },
  envioGratis: true,
  tiempoPreparacion: 30,
  pedidoMinimo: 0,
  horario: { apertura: 0, cierre: 24 },
  pagoMovil: { banco: 'Banco del Tesoro', nombre: 'Lisbe Ovalle', cedula: '6.966.714', telefono: '04241572275' },
  transferencia: { banco: 'Banco del Tesoro', nombre: 'Lisbe Ovalle', cuenta: '' }
};
let zonas          = [];
let selectedZona   = null;
let selectedMetodo = 'pagoMovil';
let clienteGeo     = null;
let pedidoActivoUnsub = null;

// ── DARK MODE ──
function applyDark() {
  document.body.classList.toggle('dark', darkMode);
  document.getElementById('darkBtn').textContent = darkMode ? '☀️' : '🌙';
}
function toggleDark() { darkMode = !darkMode; localStorage.setItem('darkMode', darkMode?'1':'0'); applyDark(); }
applyDark();

// ── HORARIO ──
function tiendaAbierta() {
  const h = config.horario || { apertura: 0, cierre: 24 };
  const hora = new Date().getHours();
  if (h.apertura < h.cierre) return hora >= h.apertura && hora < h.cierre;
  return hora >= h.apertura || hora < h.cierre;
}
function horarioTexto() {
  const h = config.horario || { apertura: 10, cierre: 22 };
  function fmt(n) {
    const v = Number(n);
    if (v === 0) return '12:00 AM';
    if (v < 12)  return `${String(v).padStart(2,'0')}:00 AM`;
    if (v === 12) return '12:00 PM';
    return `${String(v-12).padStart(2,'0')}:00 PM`;
  }
  return `${fmt(h.apertura)} - ${fmt(h.cierre)}`;
}
function actualizarBannerHorario() {
  const bar = document.getElementById('tiendaCerradaBar');
  if (!bar) return;
  if (!tiendaAbierta()) {
    bar.textContent = `⏰ Estamos cerrados. Horario: ${horarioTexto()}`;
    bar.style.display = 'block';
  } else {
    bar.style.display = 'none';
  }
}

// ── FIREBASE LISTENERS ──
db.collection('config').doc('tienda').onSnapshot(snap => {
  if (snap.exists) {
    const d = snap.data();
    config.whatsapp          = d.whatsapp          || config.whatsapp;
    config.metodosPago       = d.metodosPago       || config.metodosPago;
    config.envioGratis       = d.envioGratis       !== false;
    config.tiempoPreparacion = d.tiempoPreparacion || 30;
    config.pedidoMinimo      = d.pedidoMinimo      || 0;
    config.horario           = d.horario           || config.horario;
    config.pagoMovil         = d.pagoMovil         || config.pagoMovil;
    config.transferencia     = d.transferencia     || config.transferencia;
    updateEnvioBar();
    actualizarBannerHorario();
  }
});
db.collection('zonas').onSnapshot(snap => {
  zonas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
});
db.collection('productos').onSnapshot(snap => {
  products = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.visible !== false);
  renderStore();
});
setInterval(actualizarBannerHorario, 60000);

// ── CART HELPERS ──
function cartKey(pid, variant) { return pid + '_' + (variant || ''); }
function getQty(pid, variant)  { return (cart[cartKey(pid, variant)] || {}).qty || 0; }
function totalQtyForProduct(pid) {
  return Object.keys(cart).filter(k => k.startsWith(pid + '_')).reduce((s, k) => s + cart[k].qty, 0);
}
function cartTotal() { return Object.values(cart).reduce((s, i) => s + i.product.price * i.qty, 0); }

// ── TABS ──
function showTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + tab)?.classList.add('active');
  document.getElementById('tab-' + tab)?.classList.add('active');
  document.getElementById('searchWrap').style.display = tab === 'tienda' ? 'block' : 'none';
  if (tab === 'tienda')    renderStore();
  if (tab === 'carrito')   renderCart();
  if (tab === 'soporte')   renderSoporte();
  if (tab === 'historial') renderHistorial();
  if (tab === 'tracking')  {
    const pid = localStorage.getItem('pedidoActivoId');
    if (pid) {
      db.collection('pedidos').doc(pid).get().then(snap => {
        if (snap.exists) renderTracking(pid, snap.data());
        else { document.getElementById('trackingContainer').innerHTML = `<div class="empty"><div class="empty-icon">📦</div><p>No hay pedido activo</p></div>`; }
      });
    } else {
      document.getElementById('trackingContainer').innerHTML = `<div class="empty"><div class="empty-icon">📦</div><p>No tienes pedidos en curso</p><br><button onclick="showTab('tienda')" style="background:var(--rojo);color:white;border:none;border-radius:50px;padding:10px 20px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;margin-top:10px;">Hacer un pedido</button></div>`;
    }
  }
}

// ── STORE ──
function renderStore() {
  const container = document.getElementById('storeContainer');
  if (products.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🏪</div><p>¡Pronto hay productos!</p></div>`;
    updateCartCount(); return;
  }
  const searchQ   = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  const badgeLabel = { oferta:'🔥 Oferta', popular:'⭐ Popular', recomendado:'👍 Recomendado', combo:'📦 Combo', hoy:'⏰ Oferta por hoy' };
  const ofertas   = products.filter(p => p.oferta && !searchQ);
  const populares = products.filter(p => p.etiqueta === 'popular' && !searchQ);
  const allCats   = ['Todos', ...new Set(products.map(p => p.category || 'General'))];
  const catEmojis = {'Todos':'🏪','Víveres':'🌽','Refrescos':'🥤','Dulces':'🍬','Frescos':'🧀','Bebidas':'🍾','Higiene Personal':'🧴','Cabello':'💆','Limpieza del Hogar':'🧺','Bebé':'🍼','Papelería':'✏️','Farmacia':'💊','Varios':'💡','Panadería':'🍞','Combos':'📦'};

  let html = '';
  if (ofertas.length > 0 && !searchQ) {
    html += `<div class="ofertas-banner"><div><div class="title">🔥 Ofertas del día</div><div style="font-size:12px;opacity:0.9;">${ofertas.length} productos con descuento</div></div><div style="font-size:40px;">🏷️</div></div>`;
    html += `<div class="scroll-row">`;
    ofertas.forEach(p => { html += buildCard(p, badgeLabel, true); });
    html += `</div>`;
  }
  if (populares.length > 0 && !searchQ) {
    html += `<div class="section-title">⭐ Lo más vendido</div><div class="scroll-row">`;
    populares.forEach(p => { html += buildCard(p, badgeLabel, true); });
    html += `</div>`;
  }
  html += `<div class="cat-filter">`;
  allCats.forEach(c => { html += `<button class="cat-chip${selectedCategory===c?' active':''}" onclick="filterCat('${c}')">${catEmojis[c]||'📦'} ${c}</button>`; });
  html += `</div>`;

  const filtered = products.filter(p => {
    const matchCat    = selectedCategory === 'Todos' || (p.category || 'General') === selectedCategory;
    const matchSearch = !searchQ || p.name.toLowerCase().includes(searchQ) || (p.category||'').toLowerCase().includes(searchQ);
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🔍</div><p>No encontramos "${searchQ}"</p></div>`;
  } else {
    const cats = {};
    filtered.forEach(p => { const c = p.category||'General'; if (!cats[c]) cats[c]=[]; cats[c].push(p); });
    for (const cat in cats) {
      if (selectedCategory === 'Todos') html += `<div class="section-title">${catEmojis[cat]||'📦'} ${cat}</div>`;
      html += `<div class="products-grid">`;
      cats[cat].forEach(p => { html += buildCard(p, badgeLabel, false); });
      html += `</div>`;
    }
  }
  container.innerHTML = html;
  updateCartCount();
}


// ── UTIL: escapar comillas para HTML/JS attributes ──
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function buildCard(p, badgeLabel, isScroll) {
  const cls = isScroll ? 'oferta-card' : 'product-card';
  let badges = '';
  if (p.oferta) badges += `<span class="badge badge-oferta">🔥 Oferta</span>`;
  else if (p.etiqueta && badgeLabel[p.etiqueta]) badges += `<span class="badge badge-${p.etiqueta}">${badgeLabel[p.etiqueta]}</span>`;
  const safeName = esc(p.name);
  const safeEmoji = esc(p.emoji || '📦');
  const imgHtml = p.photo
    ? `<img src="${esc(p.photo)}" class="product-img" onclick="zoomProduct('${esc(p.photo)}','${safeName}','${safeEmoji}',${p.price})" style="cursor:zoom-in;">`
    : `<div class="product-emoji-big" onclick="zoomProduct('','${safeName}','${safeEmoji}',${p.price})" style="cursor:pointer;">${p.emoji||'📦'}</div>`;
  const priceHtml = p.oferta && p.precioAnterior
    ? `<div class="price-old">$ ${p.precioAnterior}</div><div class="price-new">$ ${p.price}</div><div class="price-save">¡Ahorras $${(p.precioAnterior-p.price).toFixed(2)}!</div>`
    : `<div class="product-price">$ ${p.price}</div>`;
  return `<div class="${cls}">${badges}<span class="cat-badge">${p.category||'General'}</span>${imgHtml}<div class="product-info"><div class="product-name">${p.name}</div>${priceHtml}${buildActionHtml(p)}</div></div>`;
}

// 7. PRODUCTOS AGOTADOS + 4. PEDIR RÁPIDO
function buildActionHtml(p) {
  // 7. Si tiene campo agotado = true → mostrar badge agotado
  if (p.agotado) {
    return `<div class="agotado-badge">❌ Agotado</div>`;
  }
  const hasV = p.variants && p.variants.length > 0;
  const tQty = totalQtyForProduct(p.id);
  if (!hasV) {
    const qty = getQty(p.id, '');
    if (qty === 0) return `
      <button class="add-btn" onclick="addToCart('${p.id}','')">+ Agregar</button>
      <button class="quick-btn" onclick="pedidoRapido('${p.id}','')">⚡ Pedir rápido</button>`;
    return `<div class="qty-ctrl"><button class="qty-btn" onclick="changeQty('${p.id}','',-1)">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="changeQty('${p.id}','',1)">+</button></div>`;
  }
  let v = `<div class="variants-label">Elige:</div><div class="variants-list">`;
  p.variants.forEach(vr => {
    const qty = getQty(p.id, vr);
    const safeVr = esc(vr);
    v += `<span class="variant-chip${qty>0?' selected':''}" onclick="toggleVariant('${p.id}','${safeVr}')">${vr}${qty>0?' ×'+qty:''}</span>`;
  });
  v += `</div>`;
  if (tQty > 0) v += `<div class="in-cart-badge">✅ ${tQty} en carrito</div>`;
  return v;
}

function filterCat(cat) { selectedCategory = cat; renderStore(); }

// 4. PEDIR RÁPIDO
function pedidoRapido(pid, variant) {
  addToCart(pid, variant);
  showTab('carrito');
}

// ── CART ACTIONS ──
function toggleVariant(pid, variant) {
  getQty(pid, variant) === 0 ? addToCart(pid, variant) : changeQty(pid, variant, -getQty(pid, variant));
}
function addToCart(pid, variant) {
  const key = cartKey(pid, variant);
  const p = products.find(x => x.id === pid);
  if (!p) return;
  if (!cart[key]) cart[key] = { product: p, variant: variant || '', qty: 0 };
  cart[key].qty++;
  renderStore();
  showToast('✅ Agregado al carrito');
  updateEnvioBar();
}
function changeQty(pid, variant, delta) {
  const key = cartKey(pid, variant);
  if (!cart[key]) return;
  cart[key].qty += delta;
  if (cart[key].qty <= 0) delete cart[key];
  renderStore();
  updateEnvioBar();
}
function updateCartCount() {
  document.getElementById('cartCount').textContent = Object.values(cart).reduce((a, b) => a + b.qty, 0);
}
function updateEnvioBar() {
  const bar = document.getElementById('envioBar');
  bar.textContent = config.envioGratis ? '🛵 Domicilio gratis' : '🛵 Domicilio disponible';
  bar.style.background = 'linear-gradient(90deg,#2dc653,#1a9e3f)';
  updateCartCount();
}

// ── GEOLOCALIZACIÓN ──
function getLocation() {
  if (!navigator.geolocation) { showToast('⚠️ Tu navegador no soporta geolocalización'); return; }
  showToast('📍 Obteniendo ubicación...');
  navigator.geolocation.getCurrentPosition(pos => {
    clienteGeo = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    const geoEl = document.getElementById('geoStatus');
    if (geoEl) {
      geoEl.className = 'geo-required geo-ok';
      geoEl.innerHTML = `✅ Ubicación obtenida · <a href="https://maps.google.com/?q=${clienteGeo.lat},${clienteGeo.lng}" target="_blank" style="color:#1b5e20;">Ver en mapa</a>`;
    }
    showToast('✅ Ubicación capturada');
    if (zonas.length > 0 && !selectedZona) {
      selectedZona = zonas[0];
      renderCart();
      showToast(`🗺️ Zona asignada: ${selectedZona.nombre}`);
    }
  }, () => {
    showToast('❌ No se pudo obtener la ubicación');
    const geoEl = document.getElementById('geoStatus');
    if (geoEl) { geoEl.className = 'geo-required geo-pending'; geoEl.textContent = '⚠️ Ubicación no obtenida. Intenta de nuevo.'; }
  });
}

// ── ZOOM ──
function zoomProduct(photo, name, emoji, price) {
  const d = document.createElement('div');
  d.className = 'zoom-modal';
  d.innerHTML = `${photo?`<img src="${photo}" alt="${name}">`:`<div class="zoom-emoji">${emoji}</div>`}<div class="zoom-name">${name}</div><div class="zoom-price">$ ${price}</div><button class="zoom-close" onclick="this.parentElement.remove()">✕ Cerrar</button>`;
  d.onclick = e => { if (e.target === d) d.remove(); };
  document.body.appendChild(d);
}

// ── CART RENDER ──
function renderCart() {
  const container = document.getElementById('cartContainer');
  const keys = Object.keys(cart);
  if (keys.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🛒</div><p>Tu carrito está vacío</p><br><button onclick="showTab('tienda')" style="background:var(--rojo);color:white;border:none;border-radius:50px;padding:10px 20px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;margin-top:10px;">Ver productos</button></div>`;
    return;
  }

  let total = 0, itemsHtml = '';
  keys.forEach(key => {
    const item = cart[key];
    const p = item.product;
    const sub = p.price * item.qty;
    total += sub;
    const thumbHtml = p.photo ? `<img src="${p.photo}" class="thumb">` : `<div class="cemoji">${p.emoji||'📦'}</div>`;
    itemsHtml += `<div class="cart-item">${thumbHtml}<div class="info"><div class="name">${p.name}</div>${item.variant?`<div class="variant">🎨 ${item.variant}</div>`:''}<div class="price">$ ${p.price} × ${item.qty} = <b>$ ${sub.toFixed(2)}</b></div></div><div class="qty-ctrl" style="width:auto;"><button class="qty-btn" onclick="changeQty('${p.id}','${item.variant}',-1);renderCart()">−</button><span class="qty-num">${item.qty}</span><button class="qty-btn" onclick="addToCart('${p.id}','${item.variant}');renderCart()">+</button></div></div>`;
  });

  const costoEnvio  = selectedZona ? (selectedZona.costo || 0) : 0;
  const totalFinal  = total + costoEnvio;
  const savedName   = localStorage.getItem('clientName')    || '';
  const savedPhone  = localStorage.getItem('clientPhone')   || '';
  const savedAddr   = localStorage.getItem('clientAddress') || '';
  const tiempo      = config.tiempoPreparacion || 30;
  const minimo      = config.pedidoMinimo || 0;

  // 2. PEDIDO MÍNIMO indicator
  const minimoHtml = minimo > 0
    ? `<div class="minimo-bar ${totalFinal >= minimo ? 'minimo-ok' : 'minimo-nok'}">${totalFinal >= minimo ? `✅ Mínimo alcanzado ($${minimo})` : `⚠️ Mínimo de pedido: $${minimo} — Faltan $${(minimo - totalFinal).toFixed(2)}`}</div>`
    : '';

  const metodosHtml = Object.entries(config.metodosPago).filter(([,v]) => v).map(([k]) => {
    const labels = { efectivo:'💵 Efectivo', pagoMovil:'📱 Pago Móvil', transferencia:'🏦 Transferencia' };
    return `<div class="metodo-chip${selectedMetodo===k?' selected':''}" onclick="selectMetodo('${k}')">${labels[k]||k}</div>`;
  }).join('');

  const zonasHtml = zonas.length > 0 ? `
    <div style="margin-top:14px;">
      <div style="font-weight:700;margin-bottom:8px;">📍 Zona de entrega <span style="color:var(--rojo);font-size:12px;">*obligatorio</span></div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${zonas.map(z => `<div class="zona-chip${selectedZona&&selectedZona.id===z.id?' selected':''}" onclick="selectZona('${z.id}')">${z.nombre}${z.costo>0?' - $'+z.costo:'  Gratis'}</div>`).join('')}
      </div>
    </div>` : '';

  const abierto     = tiendaAbierta();
  const btnDisabled = !abierto ? 'disabled' : '';
  const btnLabel    = deliveryType==='recoger' ? '📎 Enviar pedido + Comprobante' : 'Enviar pedido por WhatsApp';
  const btnText     = !abierto ? `⏰ Cerrado — Horario: ${horarioTexto()}` : btnLabel;

  container.innerHTML = `
    <div class="ux-info-bar">✔ Pedido fácil y rápido · 🕒 Entrega en ${tiempo} min</div>
    ${minimoHtml}
    <div>${itemsHtml}</div>
    <div class="cart-total">
      <div class="label">Subtotal</div>
      <div class="amount">$ ${total.toFixed(2)}</div>

function selectMetodo(m) { selectedMetodo = m; renderCart(); }
function selectZona(id)  { selectedZona = zonas.find(z => z.id === id) || null; renderCart(); }
function setDelivery(type) { deliveryType = type; comprobanteBase64 = ''; renderCart(); }

function previewComprobante(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    comprobanteBase64 = e.target.result;
    const prev = document.getElementById('comprobantePreview');
    prev.innerHTML = `<img src="${comprobanteBase64}" style="width:100%;height:100%;object-fit:cover;">`;
    prev.style.border = 'none';
  };
  reader.readAsDataURL(file);
}

// ── ENVIAR PEDIDO ──
async function sendOrder() {
  if (!tiendaAbierta()) { showToast(`⏰ Estamos cerrados. Vuelve en horario de atención`); return; }

  const name    = document.getElementById('custName')?.value.trim();
  const phone   = document.getElementById('custPhone')?.value.trim();
  const address = document.getElementById('custAddress')?.value.trim();
  if (!name)  { marcarError('custName');  showToast('⚠️ Falta tu nombre');    return; }
  if (!phone) { marcarError('custPhone'); showToast('⚠️ Falta tu teléfono');  return; }
  if (deliveryType === 'domicilio' && !address)  { marcarError('custAddress'); showToast('⚠️ Falta tu dirección'); return; }
  if (deliveryType === 'domicilio' && !clienteGeo) { showToast('📍 Activa tu ubicación GPS para continuar'); return; }
  if (deliveryType === 'domicilio' && zonas.length > 0 && !selectedZona) { showToast('🗺️ Selecciona tu zona de entrega'); return; }
  if (!selectedMetodo) { showToast('⚠️ Selecciona método de pago'); return; }
  if (deliveryType === 'recoger' && !comprobanteBase64) { showToast('⚠️ Sube tu comprobante de pago'); return; }

  const costoEnvio = selectedZona ? (selectedZona.costo || 0) : 0;
  let total = 0, productosMsg = '', productosArray = [];
  Object.values(cart).forEach(item => {
    const sub = item.product.price * item.qty;
    total += sub;
    productosMsg += `  ${item.product.emoji||'📦'} ${item.product.name}${item.variant?' ('+item.variant+')':''} × ${item.qty} — $${sub.toFixed(2)}\n`;
    productosArray.push({ emoji: item.product.emoji||'📦', name: item.product.name, variant: item.variant||'', qty: item.qty, price: item.product.price });
  });
  const totalFinal = total + costoEnvio;
  if (config.pedidoMinimo > 0 && totalFinal < config.pedidoMinimo) {
    showToast(`💰 Mínimo $${config.pedidoMinimo}. Faltan $${(config.pedidoMinimo - totalFinal).toFixed(2)}`);
    return;
  }

  localStorage.setItem('clientName', name);
  const phoneNorm = normalizarTelefono(phone);
  localStorage.setItem('clientPhone', phoneNorm);
  if (address) localStorage.setItem('clientAddress', address);

  const tiempo     = config.tiempoPreparacion || 30;
  const metodosLbl = { efectivo:'💵 Efectivo', pagoMovil:'📱 Pago Móvil', transferencia:'🏦 Transferencia' };

  // GUARDAR PEDIDO EN FIRESTORE PRIMERO (con estado PENDIENTE)
  showToast('⏳ Enviando pedido...');
  let pedidoRef;
  try {
    pedidoRef = await db.collection('pedidos').add({
      nombre: name, telefono: phone, entrega: deliveryType, direccion: address||'',
      zona: selectedZona ? selectedZona.nombre : '', costoEnvio,
      metodoPago: selectedMetodo, productos: productosMsg, total: totalFinal,
      productosArray, // array limpio para el tracking
      comprobante: comprobanteBase64||'', geo: clienteGeo,
      fecha: new Date().toISOString(),
      estado: 'pendiente', // ← EMPIEZA COMO PENDIENTE
      tiempoEstimado: tiempo,
      repartidor: { nombre: '', telefono: '', estado: 'pendiente' },
      nombreRepartidor: '', telefonoRepartidor: '',
    });
  } catch(e) {
    showToast('❌ Error al guardar pedido. Intenta de nuevo.');
    return;
  }

  const pedidoId = pedidoRef.id;
  const pedidoCorto = '#' + pedidoId.slice(-4).toUpperCase();

  // Guardar pedido activo para tracking
  localStorage.setItem('pedidoActivoId', pedidoId);
  localStorage.setItem('pedidoActivoFecha', new Date().toISOString());

  // MENSAJE WHATSAPP (ahora con número de pedido)
  let msg = `🛒 *Pedido ${pedidoCorto} - Bodega Tony Tony*\n`;
  msg += `🕒 *Tiempo estimado: ${tiempo} min*\n`;
  msg += `📍 Te avisaremos cuando salga\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n`;
  msg += `👤 *Cliente:* ${name}\n`;
  msg += `📞 *Teléfono:* ${phone}\n`;
  if (deliveryType === 'domicilio') {
    msg += `📍 *Entrega:* 🛵 Domicilio\n`;
    msg += `📌 *Dirección:* ${address}\n`;
    if (selectedZona) msg += `🗺️ *Zona:* ${selectedZona.nombre}\n`;
    if (clienteGeo)   msg += `📡 *Ubicación:* https://maps.google.com/?q=${clienteGeo.lat},${clienteGeo.lng}\n`;
  } else {
    msg += `📍 *Entrega:* 🏪 Pasa a recoger\n`;
  }
  msg += `💳 *Pago:* ${metodosLbl[selectedMetodo]||selectedMetodo}\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n`;
  msg += `🧺 *Productos:*\n${productosMsg}`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n`;
  msg += costoEnvio > 0
    ? `💰 *Subtotal: $${total.toFixed(2)}*\n🛵 *Envío: $${costoEnvio.toFixed(2)}*\n💰 *TOTAL: $${totalFinal.toFixed(2)}*\n`
    : `🛵 *Envío: Gratis*\n💰 *TOTAL: $${totalFinal.toFixed(2)}*\n`;
  if (deliveryType === 'recoger') msg += `\n📎 _(Comprobante adjunto)_`;

  window.open(`https://wa.me/${config.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');

  // Vaciar carrito
  cart = {}; comprobanteBase64 = ''; clienteGeo = null; updateCartCount();

  // MOSTRAR PANTALLA DE TRACKING INMEDIATAMENTE
  escucharPedido(pedidoId);
  renderTracking(pedidoId, { estado: 'pendiente', nombre: name, telefono: phone, entrega: deliveryType, direccion: address||'', zona: selectedZona?.nombre||'', metodoPago: selectedMetodo, productos: productosMsg, productosArray, total: totalFinal, tiempoEstimado: tiempo, nombreRepartidor: '', telefonoRepartidor: '', fecha: new Date().toISOString() });
}

function marcarError(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('field-error'); el.focus();
  setTimeout(() => el.classList.remove('field-error'), 2000);
}

function escucharPedido(pedidoId) {
  if (pedidoActivoUnsub) pedidoActivoUnsub();
  pedidoActivoUnsub = db.collection('pedidos').doc(pedidoId).onSnapshot(snap => {
    if (!snap.exists) return;
    const data = snap.data();
    const estado = data.estado;
    // Toasts de notificación
    if (estado === 'confirmado') showToast('✅ ¡Pedido confirmado!');
    if (estado === 'preparando' || estado === 'preparacion') showToast('👨‍🍳 Tu pedido está en preparación');
    if (estado === 'en_camino' || estado === 'camino') showToast('🛵 ¡Tu pedido va en camino!');
    if (estado === 'entregado') showToast('📦 ¡Tu pedido fue entregado!');
    if (estado === 'cancelado') showToast('❌ Tu pedido fue cancelado');
    // Actualizar pantalla de tracking si está visible
    const trackingEl = document.getElementById('trackingContainer');
    if (trackingEl && document.getElementById('view-tracking')?.classList.contains('active')) {
      renderTracking(pedidoId, data);
    }
    // Si entregado o cancelado, limpiar pedido activo después de un rato
    if ((estado === 'entregado' || estado === 'cancelado') && localStorage.getItem('pedidoActivoId') === pedidoId) {
      localStorage.removeItem('pedidoActivoId');
    }
  });
}

// ─── RENDER TRACKING / SEGUIMIENTO DEL PEDIDO ───
function renderTracking(pedidoId, data) {
  const container = document.getElementById('trackingContainer');
  if (!container) return;

  const estado = data.estado || 'pendiente';
  const corto  = '#' + pedidoId.slice(-4).toUpperCase();

  // Pasos del tracking
  const pasos = [
    { key:'pendiente',     label:'Recibido',     icon:'📥' },
    { key:'confirmado',    label:'Confirmado',   icon:'✅' },
    { key:'preparacion',   label:'Preparando',   icon:'👨‍🍳' },
    { key:'preparando',    label:'Preparando',   icon:'👨‍🍳' },
    { key:'camino',        label:'En camino',    icon:'🛵' },
    { key:'en_camino',     label:'En camino',    icon:'🛵' },
    { key:'entregado',     label:'Entregado',    icon:'📦' },
    { key:'cancelado',     label:'Cancelado',    icon:'❌' },
  ];

  const orden = ['pendiente','confirmado','preparacion','camino','entregado'];
  let pasoIdx = orden.indexOf(estado === 'preparando' ? 'preparacion' : estado === 'en_camino' ? 'camino' : estado);
  if (pasoIdx === -1) pasoIdx = 0;

  // Productos limpios
  let productosHtml = '';
  if (data.productosArray && data.productosArray.length) {
    productosHtml = `<div style="display:flex;flex-direction:column;gap:6px;margin:10px 0;">` +
      data.productosArray.map(p =>
        `<div style="display:flex;align-items:center;gap:8px;background:var(--card);border-radius:10px;padding:8px 10px;">
          <span style="font-size:22px;">${p.emoji||'📦'}</span>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:13px;">${esc(p.name)}${p.variant?` <span style="color:var(--subtext);font-size:11px;">(${esc(p.variant)})</span>`:''}</div>
            <div style="font-size:12px;color:var(--subtext);">${p.qty} × $${p.price} = $${(p.qty*p.price).toFixed(2)}</div>
          </div>
        </div>`
      ).join('') + `</div>`;
  } else if (data.productos) {
    productosHtml = `<div style="background:var(--card);border-radius:10px;padding:10px;font-size:13px;white-space:pre-line;color:var(--subtext);margin:10px 0;">${data.productos}</div>`;
  }

  // Estado label y color
  const estadoMap = { pendiente:'⏳ Pendiente', confirmado:'✅ Confirmado', preparacion:'👨‍🍳 En preparación', preparando:'👨‍🍳 En preparación', camino:'🛵 En camino', en_camino:'🛵 En camino', entregado:'📦 Entregado', cancelado:'❌ Cancelado' };
  const estadoColorMap = { pendiente:'#856404', confirmado:'#155724', preparacion:'#004085', preparando:'#004085', camino:'#c05621', en_camino:'#c05621', entregado:'#155724', cancelado:'#e63946' };
  const estadoBgMap = { pendiente:'#fff3cd', confirmado:'#d4edda', preparacion:'#cce5ff', preparando:'#cce5ff', camino:'#ffe5d0', en_camino:'#ffe5d0', entregado:'#d4edda', cancelado:'#ffd6d6' };

  // Barra de progreso visual
  const progresoSteps = orden.map((k, i) => {
    const activo = i <= pasoIdx && estado !== 'cancelado';
    const cancelStyle = estado === 'cancelado' ? 'opacity:0.4;' : '';
    return `<div style="flex:1;text-align:center;position:relative;${cancelStyle}">
      <div style="width:36px;height:36px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:18px;background:${activo?'var(--verde)':'var(--gris)'};color:${activo?'white':'var(--subtext)'};transition:all 0.3s;">${pasos.find(p=>p.key===k)?.icon||'●'}</div>
      <div style="font-size:10px;font-weight:700;color:${activo?'var(--verde)':'var(--subtext)'};">${pasos.find(p=>p.key===k)?.label||k}</div>
      ${i < orden.length-1 ? `<div style="position:absolute;top:18px;right:-50%;width:100%;height:3px;background:${i < pasoIdx && estado !== 'cancelado'?'var(--verde)':'var(--border)'};z-index:-1;"></div>` : ''}
    </div>`;
  }).join('');

  // Botón cancelar (solo si pendiente o confirmado)
  const puedeCancelar = (estado === 'pendiente' || estado === 'confirmado');
  const cancelBtn = puedeCancelar
    ? `<button onclick="cancelarPedidoCliente('${pedidoId}')" style="width:100%;margin-top:10px;padding:12px;background:var(--rojo);color:white;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;">❌ Cancelar pedido</button>`
    : '';

  // Info repartidor
  const repNombre = data.nombreRepartidor || '';
  const repTel    = data.telefonoRepartidor || '';
  const repHtml = repNombre && (estado === 'camino' || estado === 'en_camino')
    ? `<div style="background:var(--gris);border-radius:12px;padding:12px;margin:10px 0;text-align:center;">
        <div style="font-size:12px;color:var(--subtext);margin-bottom:4px;">🛵 Tu repartidor</div>
        <div style="font-weight:800;font-size:15px;">${repNombre}</div>
        <a href="https://wa.me/${repTel.replace(/\D/g,'')}" target="_blank" style="display:inline-block;margin-top:6px;background:#25d366;color:white;border-radius:50px;padding:6px 14px;font-size:12px;font-weight:700;text-decoration:none;">📞 Contactar</a>
      </div>`
    : '';

  // Info de entrega
  const entregaInfo = data.entrega === 'domicilio'
    ? `🛵 Domicilio · ${data.direccion || '—'}${data.zona ? ' · ' + data.zona : ''}`
    : `🏪 Recoger en tienda`;

  container.innerHTML = `
    <div style="text-align:center;padding:20px 0;">
      <div style="font-size:40px;margin-bottom:8px;">🛒</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--text);">${corto}</div>
      <div style="font-size:13px;color:var(--subtext);margin-bottom:12px;">Pedido de ${data.nombre || '—'}</div>
      <span style="display:inline-block;font-size:13px;font-weight:800;padding:6px 14px;border-radius:50px;background:${estadoBgMap[estado]||'#fff3cd'};color:${estadoColorMap[estado]||'#856404'};">${estadoMap[estado]||estado}</span>
    </div>

    <div style="display:flex;align-items:center;gap:4px;margin:14px 0;">${progresoSteps}</div>

    <div style="background:var(--oscuro);color:white;border-radius:16px;padding:16px;text-align:center;margin:14px 0;">
      <div style="font-size:12px;opacity:0.7;">Total del pedido</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--amarillo);letter-spacing:1px;">$ ${data.total?.toFixed(2)||'0.00'}</div>
    </div>

    <div style="font-weight:800;font-size:14px;margin-bottom:6px;">🧺 Productos</div>
    ${productosHtml}

    <div style="font-size:12px;color:var(--subtext);margin-top:10px;line-height:1.8;">
      📍 ${entregaInfo}<br>
      💳 ${data.metodoPago||'—'}<br>
      ⏱️ Tiempo estimado: ${data.tiempoEstimado||30} min<br>
      🕐 ${new Date(data.fecha).toLocaleString('es-VE',{dateStyle:'short',timeStyle:'short'})}
    </div>

    ${repHtml}
    ${cancelBtn}

    <button onclick="showTab('tienda')" style="width:100%;margin-top:14px;padding:12px;background:var(--card);color:var(--text);border:2px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;">Hacer otro pedido</button>
  `;
}

async function cancelarPedidoCliente(pedidoId) {
  if (!confirm('¿Seguro que quieres cancelar este pedido?')) return;
  try {
    await db.collection('pedidos').doc(pedidoId).update({ estado: 'cancelado', fechaCancelacion: new Date().toISOString() });
    showToast('❌ Pedido cancelado');
    localStorage.removeItem('pedidoActivoId');
    setTimeout(() => showTab('historial'), 800);
  } catch(e) {
    showToast('⚠️ No se pudo cancelar');
  }
}

// ── 14. SOPORTE / RECLAMOS ──
let soporteImagenBase64 = '';

function renderSoporte() {

function previewSoporteImg(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {

    const prev = document.getElementById('sImagenPreview');
    prev.innerHTML = `<img src="${soporteImagenBase64}" style="width:100%;height:100%;object-fit:cover;">`;
    prev.style.border = 'none';
  };
  reader.readAsDataURL(file);
}

async function enviarSoporte() {
  const nombre      = document.getElementById('sNombre')?.value.trim();
  const telefono    = document.getElementById('sTelefono')?.value.trim();
  const pedidoId    = document.getElementById('sPedidoId')?.value.trim();
  const tipo        = document.getElementById('sTipoProblema')?.value;
  const descripcion = document.getElementById('sDescripcion')?.value.trim();

  if (!nombre)      { showToast('⚠️ Escribe tu nombre');       return; }
  if (!telefono)    { showToast('⚠️ Escribe tu teléfono');     return; }
  if (!tipo)        { showToast('⚠️ Selecciona el tipo de problema'); return; }
  if (!descripcion) { showToast('⚠️ Describe el problema');    return; }

  showToast('⏳ Enviando reporte...');
  await db.collection('soporte').add({
    clienteNombre: nombre,
    telefono,
    pedidoId: pedidoId || '',
    tipoProblema: tipo,
    descripcion,
    imagenURL: soporteImagenBase64 || '',
    estado: 'nuevo',
    fecha: new Date().toISOString(),
  });

  soporteImagenBase64 = '';
  showToast('✅ Reporte enviado. Te contactaremos pronto.');
  document.getElementById('soporteContainer').innerHTML = `
    <div style="text-align:center;padding:40px 20px;">
      <div style="font-size:60px;margin-bottom:12px;">📬</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--text);margin-bottom:8px;">¡Reporte enviado!</div>

// ── NORMALIZAR TELÉFONO ──
function normalizarTelefono(tel) {
  tel = tel.replace(/\s+/g, '').replace(/[^0-9+]/g, '');
  if (tel.startsWith('+')) return tel; // ya tiene código
  if (tel.startsWith('57') && tel.length >= 11) return '+' + tel; // Colombia sin +
  if (tel.startsWith('58') && tel.length >= 11) return '+' + tel; // Venezuela sin +
  if (tel.startsWith('0')) tel = tel.slice(1); // quitar 0 inicial
  // Por defecto asumir Venezuela +58
  return '+58' + tel;
}

function guardarRegistro() {
  const nombre   = document.getElementById('regNombre')?.value.trim();
  const codigo   = document.getElementById('regCodigo')?.value || '+58';
  const telRaw   = document.getElementById('regTelefono')?.value.trim();
  if (!nombre) { showToast('⚠️ Escribe tu nombre'); return; }
  if (!telRaw || telRaw.length < 7) { showToast('⚠️ Escribe tu número'); return; }
  // Limpiar número y unir con código
  const telLimpio = telRaw.replace(/\D/g, '');
  const telefono  = codigo + telLimpio;
  localStorage.setItem('clientName',  nombre);
  localStorage.setItem('clientPhone', telefono);
  const modal = document.getElementById('registroModal');
  if (modal) modal.remove();
  showToast(`¡Bienvenido ${nombre}! 🎉`);
}

function updateEnvioBarDinamico() {
  const bar = document.getElementById('envioBar');
  if (!bar) return;
  if (config.envioGratis) {
    bar.innerHTML = '🛵 Domicilio gratis';
    bar.style.background = 'linear-gradient(90deg,#2dc653,#1a9e3f)';
    updateCartCount();
    return;
  }
  const montoEnvioGratis = config.montoEnvioGratis || 0;
  const total = cartTotal();
  if (montoEnvioGratis > 0) {
    const pct = Math.min(100, (total / montoEnvioGratis) * 100);
    if (total >= montoEnvioGratis) {
      bar.innerHTML = '🎉 ¡Envío gratis desbloqueado!';
      bar.style.background = 'linear-gradient(90deg,#2dc653,#1a9e3f)';
    } else {
      const faltan = (montoEnvioGratis - total).toFixed(2);
      bar.innerHTML = `🛵 Agrega $${faltan} más para envío gratis <div class="envio-progress"><div class="envio-progress-bar" style="width:${pct}%"></div></div>`;
      bar.style.background = 'linear-gradient(90deg,#ff6b2b,#e63946)';
    }
  } else {
    bar.innerHTML = '🛵 Domicilio disponible';
    bar.style.background = 'linear-gradient(90deg,#2dc653,#1a9e3f)';
  }
  updateCartCount();
}

function renderHistorial() {
  const container = document.getElementById('historialContainer');
  const phone = localStorage.getItem('clientPhone') || '';
  if (!phone) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>Haz tu primer pedido para ver tu historial</p><br><button onclick="showTab('tienda')" style="background:var(--rojo);color:white;border:none;border-radius:50px;padding:10px 20px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;margin-top:10px;">Ver productos</button></div>`;
    return;
  }
  container.innerHTML = `<div style="text-align:center;padding:20px;color:var(--subtext);">⏳ Cargando tus pedidos...</div>`;

  const phoneNorm = normalizarTelefono(phone);
  const phoneSin  = phoneNorm.replace(/^\+\d{2}/, '');
  const queries   = [phoneNorm, phone, phoneSin].filter((v, i, a) => v && a.indexOf(v) === i);

  Promise.all(
    queries.map(q =>
      db.collection('pedidos').where('telefono', '==', q).orderBy('fecha', 'desc').limit(30).get()
        .catch(() => ({ docs: [] }))
    )
  ).then(results => {
    const seen = new Set();
    const docs = [];
    results.forEach(snap => {
      snap.docs.forEach(d => { if (!seen.has(d.id)) { seen.add(d.id); docs.push(d); } });
    });
    docs.sort((a, b) => new Date(b.data().fecha) - new Date(a.data().fecha));

    if (docs.length === 0) {
      container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>No tienes pedidos aún</p></div>`; return;
    }

    const estadoMap   = { pendiente:'⏳ Pendiente', confirmado:'✅ Confirmado', preparacion:'👨‍🍳 Preparando', preparando:'👨‍🍳 Preparando', camino:'🛵 En camino', en_camino:'🛵 En camino', entregado:'📦 Entregado', cancelado:'❌ Cancelado' };
    const estadoColor = { pendiente:'#856404', confirmado:'#155724', preparacion:'#004085', preparando:'#004085', camino:'#c05621', en_camino:'#c05621', entregado:'#155724', cancelado:'#e63946' };
    const estadoBg    = { pendiente:'#fff3cd', confirmado:'#d4edda', preparacion:'#cce5ff', preparando:'#cce5ff', camino:'#ffe5d0', en_camino:'#ffe5d0', entregado:'#d4edda', cancelado:'#ffd6d6' };

    let html = `<div style="font-family:'Bebas Neue',sans-serif;font-size:22px;margin-bottom:14px;border-left:4px solid var(--rojo);padding-left:10px;">📋 Mis Pedidos</div>`;
    docs.forEach(doc => {

      const est   = p.estado || 'pendiente';
      const corto = '#' + pid.slice(-4).toUpperCase();
      const esActivo = ['pendiente','confirmado','preparacion','preparando','camino','en_camino'].includes(est);

      html += `<div class="historial-card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
          <div>
            <div style="font-weight:800;font-size:14px;">${corto} · ${fecha}</div>
            <div style="font-size:12px;color:var(--subtext);margin-top:2px;">${p.entrega==='domicilio'?'🛵 Domicilio':'🏪 Recoger'} · ${p.metodoPago||'—'}</div>
          </div>
          <span class="historial-estado" style="background:${estadoBg[est]||'#fff3cd'};color:${estadoColor[est]||'#856404'};flex-shrink:0;">${estadoMap[est]||est}</span>
        </div>
        <div style="font-size:13px;white-space:pre-line;color:var(--subtext);margin-bottom:8px;max-height:80px;overflow:hidden;">${p.productos || ''}</div>

        </div>
      </div>`;
    });

  });
}

function repetirDesdeHistorial(pedidoId) {
  db.collection('pedidos').doc(pedidoId).get().then(snap => {
    if (!snap.exists) return;
    const data = snap.data();
    // Parsear productos del texto
    const lineas = (data.productos || '').split('\n').filter(l => l.trim());
    let agregados = 0;
    lineas.forEach(linea => {
      const match = linea.match(/([^\s]+)\s+(.+?)\s+×\s+(\d+)/);
      if (!match) return;
      const nombreBusca = match[2].replace(/\(.*\)/, '').trim();
      const qty = parseInt(match[3]) || 1;
      const p = products.find(x => x.name.includes(nombreBusca) && !x.agotado);
      if (!p) return;
      const key = cartKey(p.id, '');
      if (!cart[key]) cart[key] = { product: p, variant: '', qty: 0 };
      cart[key].qty += qty;
      agregados++;
    });
    if (agregados === 0) { showToast('⚠️ Productos no disponibles'); return; }
    showToast(`🔁 ${agregados} producto(s) agregados`);
    actualizarFloatingCart();
    showTab('carrito');
  });
}

// ── CUPONES DE DESCUENTO ──
let cuponActivo = null;

async function aplicarCupon() {
  const codigo = document.getElementById('cuponInput')?.value.trim().toUpperCase();
  if (!codigo) { showToast('⚠️ Escribe un código'); return; }
  try {
    const snap = await db.collection('cupones').where('codigo','==',codigo).where('activo','==',true).get();
    if (snap.empty) { showToast('❌ Cupón inválido o expirado'); cuponActivo = null; renderCart(); return; }
    const cupon = { id: snap.docs[0].id, ...snap.docs[0].data() };
    // Validar fecha expiración
    if (cupon.expira && new Date(cupon.expira) < new Date()) { showToast('❌ Cupón expirado'); cuponActivo = null; renderCart(); return; }
    cuponActivo = cupon;
    showToast(`✅ Cupón aplicado: ${cupon.descuento}% de descuento`);
    renderCart();
  } catch(e) { showToast('⚠️ Error al verificar cupón'); }
}

function calcularDescuentoCupon(total) {
  if (!cuponActivo) return 0;
  if (cuponActivo.tipo === 'porcentaje') return total * (cuponActivo.descuento / 100);
  if (cuponActivo.tipo === 'fijo') return Math.min(cuponActivo.descuento, total);
  return 0;
}

// ── PROGRAMA DE PUNTOS ──
function getPuntos() { try { return parseInt(localStorage.getItem('puntos') || '0'); } catch { return 0; } }
function sumarPuntos(total) {
  const puntosGanados = Math.floor(total); // 1 punto por cada $1
  const actuales = getPuntos() + puntosGanados;
  localStorage.setItem('puntos', actuales);
  return puntosGanados;
}
function getPuntosInfo() {
  const p = getPuntos();
  return { puntos: p, proximoNivel: p < 50 ? 50 : p < 100 ? 100 : p < 200 ? 200 : null, nivel: p >= 200 ? '🥇 VIP' : p >= 100 ? '🥈 Premium' : p >= 50 ? '🥉 Regular' : '⭐ Nuevo' };
}

// Patch sendOrder para sumar puntos y aplicar cupón
const _sendOrderOrigNew = sendOrder;
sendOrder = function() {
  guardarUltimoPedido(cart);
  _sendOrderOrigNew();
};

// Patch renderCart para agregar cupones y puntos
const _renderCartOrigNew = renderCart;
renderCart = function() {
  _renderCartOrigNew();
  const container = document.getElementById('cartContainer');
  if (!container || Object.keys(cart).length === 0) return;

  // Actualizar texto tiempo
  const uxBar = document.querySelector('.ux-info-bar');
  if (uxBar) uxBar.textContent = `✔ Pedido fácil y rápido · 🛵 Entrega en ${tiempoRango()}`;

  // Insertar sección puntos + cupón antes del botón de WhatsApp
  const waBtn = container.querySelector('.whatsapp-btn');
  if (waBtn && !document.getElementById('cuponSection')) {
    const puntoInfo = getPuntosInfo();
    const section = document.createElement('div');
    section.id = 'cuponSection';
    // Puntos
    section.innerHTML = `
      <div class="puntos-bar">
        <div>
          <div style="font-size:12px;opacity:0.8;">⭐ Mis puntos — ${puntoInfo.nivel}</div>
          <div class="puntos-num">${puntoInfo.puntos} pts</div>
        </div>
        <div style="font-size:12px;text-align:right;opacity:0.8;">${puntoInfo.proximoNivel ? `${puntoInfo.proximoNivel - puntoInfo.puntos} pts para siguiente nivel` : '¡Nivel máximo!'}</div>
      </div>
      <div style="font-weight:700;margin-bottom:8px;">🎟️ ¿Tienes un cupón?</div>
      <div class="cupon-input-wrap">
        <input type="text" id="cuponInput" placeholder="Código de descuento" style="text-transform:uppercase;" ${cuponActivo?'disabled':''}>
        <button class="cupon-btn" onclick="aplicarCupon()" ${cuponActivo?'disabled':''}>Aplicar</button>
      </div>
      ${cuponActivo ? `<div class="cupon-ok">✅ Cupón "${cuponActivo.codigo}" aplicado — ${cuponActivo.descuento}% descuento${cuponActivo.tipo==='fijo'?' de $'+cuponActivo.descuento:''} <button onclick="cuponActivo=null;renderCart()" style="background:none;border:none;color:var(--rojo);cursor:pointer;font-weight:700;">✕</button></div>` : ''}`;
    waBtn.parentNode.insertBefore(section, waBtn);
  }
  actualizarFloatingCart();
};

// ── 1. HORARIO MEJORADO CON MINUTOS ──
// Sobrescribe tiendaAbierta para soportar horas+minutos si config.horario tiene minutosApertura/minutosCierre
function tiendaAbiertoExtendido() {
  const h    = config.horario || { apertura: 0, cierre: 24 };
  const ahora = new Date();
  const totalMin = ahora.getHours() * 60 + ahora.getMinutes();
  const aperMin  = (h.apertura || 0) * 60 + (h.minutosApertura || 0);
  const cierreMin = (h.cierre   || 24) * 60 + (h.minutosCierre  || 0);
  if (aperMin < cierreMin) return totalMin >= aperMin && totalMin < cierreMin;
  return totalMin >= aperMin || totalMin < cierreMin; // nocturno
}
// Patch: usar versión extendida si tiene minutos, sino la existente
const _tiendaAbiertaOrig = tiendaAbierta;
tiendaAbierta = function() {
  const h = config.horario || {};
  if (h.minutosApertura != null || h.minutosCierre != null) return tiendaAbiertoExtendido();
  return _tiendaAbiertaOrig();
};

// ── 2. UPSELL — sugerencias al agregar producto ──
let upsellTimeout = null;
function mostrarUpsell(pid) {
  // Buscar hasta 3 productos de la misma categoría o populares, excluyendo el actual
  const p = products.find(x => x.id === pid);
  if (!p) return;
  const sugeridos = products.filter(x =>
    x.id !== pid && !x.agotado && x.visible !== false &&
    ((x.category === p.category) || x.etiqueta === 'popular')
  ).slice(0, 3);
  if (sugeridos.length === 0) return;
  // Insertar sección upsell en la tienda si no existe
  let upsellEl = document.getElementById('upsellSection');
  if (!upsellEl) {
    upsellEl = document.createElement('div');
    upsellEl.id = 'upsellSection';
    upsellEl.className = 'upsell-section';
    const container = document.getElementById('storeContainer');
    if (container) container.prepend(upsellEl);
  }
  upsellEl.innerHTML = `<div class="upsell-title">🔥 Combínalo con…</div>
    <div class="upsell-scroll">
      ${sugeridos.map(s => `
        <div class="upsell-card">
          <div class="uemoji">${s.photo ? `<img src="${s.photo}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;">` : (s.emoji||'📦')}</div>
          <div class="uname">${s.name}</div>
          <div class="uprice">$ ${s.price}</div>
          <button class="uadd" onclick="addToCart('${s.id}','');mostrarUpsell('${s.id}')">+ Agregar</button>
        </div>`).join('')}
    </div>`;
  clearTimeout(upsellTimeout);
  upsellTimeout = setTimeout(() => { if (upsellEl) upsellEl.remove(); }, 8000);
}

// Patch addToCart para mostrar upsell
const _addToCartOrig = addToCart;
addToCart = function(pid, variant) {
  _addToCartOrig(pid, variant);
  // Solo mostrar upsell si estamos en la tienda y el carrito tiene 1+ items
  if (document.getElementById('view-tienda')?.classList.contains('active')) {
    mostrarUpsell(pid);
  }
  actualizarFloatingCart();
};

// Patch changeQty para actualizar barra flotante
const _changeQtyOrig = changeQty;
changeQty = function(pid, variant, delta) {
  _changeQtyOrig(pid, variant, delta);
  actualizarFloatingCart();
};

// ── 3. REPETIR PEDIDO ──
function guardarUltimoPedido(cartData) {
  try {
    const resumen = Object.values(cartData).map(i => ({
      pid: i.product.id, name: i.product.name, emoji: i.product.emoji||'📦',
      price: i.product.price, variant: i.variant, qty: i.qty
    }));
    localStorage.setItem('ultimoPedido', JSON.stringify(resumen));
  } catch(e) {}
}

function repetirPedido() {
  try {
    const resumen = JSON.parse(localStorage.getItem('ultimoPedido') || '[]');
    if (!resumen.length) { showToast('No hay pedido anterior guardado'); return; }
    let agregados = 0;
    resumen.forEach(item => {
      const p = products.find(x => x.id === item.pid);
      if (!p || p.agotado) return;
      const key = cartKey(item.pid, item.variant);
      if (!cart[key]) cart[key] = { product: p, variant: item.variant || '', qty: 0 };
      cart[key].qty += item.qty;
      agregados++;
    });
    if (agregados === 0) { showToast('⚠️ Los productos ya no están disponibles'); return; }
    renderStore();
    actualizarFloatingCart();
    showToast(`🔁 ${agregados} producto(s) agregados al carrito`);
    showTab('carrito');
  } catch(e) { showToast('No se pudo repetir el pedido'); }
}

function tieneUltimoPedido() {
  try { return JSON.parse(localStorage.getItem('ultimoPedido') || '[]').length > 0; } catch { return false; }
}

// ── 4. RANGO DE TIEMPO ESTIMADO ──
function tiempoRango() {
  const t = config.tiempoPreparacion || 30;
  return `${t}–${t + 10} min`;
}

// ── 5. BARRA FLOTANTE CARRITO ──
function actualizarFloatingCart() {
  const total = cartTotal();
  const items = Object.values(cart).reduce((a, b) => a + b.qty, 0);
  const bar = document.getElementById('floatingCart');
  const totalEl = document.getElementById('floatTotal');
  if (!bar) return;
  if (items > 0) {
    bar.classList.add('visible');
    document.body.classList.add('has-float-bar');
    if (totalEl) {
      const costoEnvio = selectedZona ? (selectedZona.costo || 0) : 0;
      totalEl.textContent = `$ ${(total + costoEnvio).toFixed(2)} · ${items} item${items>1?'s':''}`;
    }
  } else {
    bar.classList.remove('visible');
    document.body.classList.remove('has-float-bar');
  }
  updateCartCount();
}

// ── 8. MOSTRAR/OCULTAR AGOTADOS ──
let mostrarAgotados = true;
function toggleMostrarAgotados() {
  mostrarAgotados = !mostrarAgotados;
  renderStore();
  showToast(mostrarAgotados ? '👁️ Mostrando agotados' : '🙈 Ocultando agotados');
}

// Patch renderStore para respetar mostrarAgotados y agregar botón "Repetir pedido"
const _renderStoreOrig = renderStore;
renderStore = function() {
  // Filtrar agotados según preferencia
  if (!mostrarAgotados) {
    const orig = products;
    products = products.filter(p => !p.agotado);
    _renderStoreOrig();
    products = orig;
  } else {
    _renderStoreOrig();
  }
  // Agregar barra repetir pedido si hay pedido previo
  if (tieneUltimoPedido()) {
    const container = document.getElementById('storeContainer');
    if (container && !document.getElementById('repeatBar')) {
      const resumen = JSON.parse(localStorage.getItem('ultimoPedido') || '[]');
      const bar = document.createElement('div');
      bar.id = 'repeatBar';
      bar.className = 'repeat-bar';
      bar.innerHTML = `<div class="repeat-bar-info"><div style="font-weight:800;font-size:14px;color:white;">🔁 Repetir pedido anterior</div><div class="repeat-bar-label">${resumen.length} producto(s) · Toca para cargar</div></div><button class="repeat-bar-btn" onclick="repetirPedido()">Repetir 🔁</button>`;
      container.prepend(bar);
    }
  }
  actualizarFloatingCart();
};

// ── PATCH sendOrder para usar tiempo rango (guardado ya hecho en patch anterior) ──
const _sendOrderOrig = sendOrder;
sendOrder = function() {
  _sendOrderOrig();
};

// Patch renderCart para usar rango de tiempo y botón ocultar agotados
const _renderCartOrig = renderCart;
renderCart = function() {
  _renderCartOrig();
  // Reemplazar texto de tiempo si existe en la barra UX
  const uxBar = document.querySelector('.ux-info-bar');
  if (uxBar) {
    uxBar.textContent = `✔ Pedido fácil y rápido · 🛵 Entrega en ${tiempoRango()}`;
  }
  actualizarFloatingCart();
};

// Inicializar barra flotante al cargar
actualizarFloatingCart();
// Mostrar registro si es primera vez
setTimeout(verificarRegistroCliente, 800);

// ── SERVICE WORKER (offline / VE internet inestable) ──
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'bodega-tony-v1';
const PRECACHE = [location.pathname];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(PRECACHE)).then(() => self.skipWaiting()));
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(ks => Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));
});
self.addEventListener('fetch', e => {
  if (e.request.url.includes('firestore') || e.request.url.includes('firebase') || e.request.method !== 'GET') return;
  e.respondWith(
    caches.match(e.request).then(cached => {
      const net = fetch(e.request).then(res => {
        if (res && res.status === 200) caches.open(CACHE).then(c => c.put(e.request, res.clone()));
        return res;
      }).catch(() => null);
      return cached || net;
    })
  );
});`;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, { scope: '/' })
    .then(() => console.log('[SW] Registrado ✅'))
    .catch(e => console.warn('[SW] No registrado:', e));
}

// ── HAPTIC FEEDBACK ──
function vibrate(pattern = [30]) {
  if ('vibrate' in navigator) navigator.vibrate(pattern);
}

// Patch addToCart para haptic + bump animation
const _addToCartHaptic = addToCart;
addToCart = function(pid, variant) {
  _addToCartHaptic(pid, variant);
  vibrate([20]);
  // Bump animation en el contador
  const counter = document.getElementById('cartCount');
  if (counter) {
    counter.classList.remove('bump');
    void counter.offsetWidth; // reflow
    counter.classList.add('bump');
  }
};
