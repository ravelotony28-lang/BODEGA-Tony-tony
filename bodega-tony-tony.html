<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="Bodega Tony Tony - Haz tu pedido aquí 🛒">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Bodega Tony Tony">
<title>Bodega Tony Tony 🛒</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
:root{--rojo:#e63946;--amarillo:#f4d35e;--verde:#2dc653;--naranja:#ff6b2b;--oscuro:#1a1a2e;--sombra:0 4px 20px rgba(0,0,0,0.12);--bg:#f7f7f7;--card:#fff;--text:#1a1a2e;--subtext:#888;--border:#eee;--gris:#f1f1f1;}
.dark{--bg:#0f0f1a;--card:#1a1a2e;--text:#f0f0f0;--subtext:#aaa;--border:#2a2a3e;--gris:#2a2a3e;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--oscuro);color:white;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--amarillo);line-height:1;}
.logo span{color:var(--rojo);}
.dark-btn{background:none;border:none;font-size:20px;cursor:pointer;}
.cart-btn{background:var(--rojo);color:white;border:none;border-radius:50px;padding:9px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.cart-count{background:var(--amarillo);color:var(--oscuro);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;}
.tienda-cerrada-bar{background:linear-gradient(90deg,#e63946,#c1121f);color:white;text-align:center;padding:10px 16px;font-size:13px;font-weight:700;display:none;}
.envio-bar{background:linear-gradient(90deg,#2dc653,#1a9e3f);color:white;text-align:center;padding:8px 16px;font-size:13px;font-weight:700;transition:background 0.3s;}
.tabs{display:flex;background:var(--card);border-bottom:3px solid var(--amarillo);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:11px 16px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;color:var(--subtext);cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-3px;transition:all 0.2s;}
.tab-btn.active{color:var(--rojo);border-bottom-color:var(--rojo);}
.search-wrap{padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);position:relative;}
.search-wrap input{width:100%;padding:10px 16px 10px 38px;border:2px solid var(--border);border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;background:var(--bg);color:var(--text);transition:border 0.2s;}
.search-wrap input:focus{border-color:var(--rojo);}
.search-wrap::before{content:'🔍';position:absolute;left:28px;top:50%;transform:translateY(-50%);font-size:15px;}
.view{display:none;padding:14px;}
.view.active{display:block;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--text);margin:16px 0 10px;padding-left:8px;border-left:3px solid var(--amarillo);}
.ofertas-banner{background:linear-gradient(135deg,#e63946,#ff6b2b);border-radius:16px;padding:16px;margin-bottom:16px;color:white;display:flex;align-items:center;justify-content:space-between;}
.ofertas-banner .title{font-family:'Bebas Neue',sans-serif;font-size:26px;}
.scroll-row{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.scroll-row::-webkit-scrollbar{display:none;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;}
.product-card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--sombra);display:flex;flex-direction:column;position:relative;transition:transform 0.15s;}
.product-card:active{transform:scale(0.98);}
.oferta-card{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:var(--sombra);flex-shrink:0;width:160px;position:relative;}
.product-img{width:100%;height:130px;object-fit:cover;}
.oferta-card .product-img{height:110px;}
.product-emoji-big{font-size:46px;text-align:center;padding:14px 0 6px;}
.product-info{padding:8px 12px 12px;flex:1;display:flex;flex-direction:column;gap:5px;}
.product-name{font-weight:700;font-size:13px;color:var(--text);line-height:1.3;}
.product-price{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--rojo);}
.price-old{font-size:12px;color:var(--subtext);text-decoration:line-through;}
.price-new{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--verde);}
.price-save{font-size:11px;font-weight:700;color:var(--verde);}
.badge{position:absolute;top:8px;left:8px;border-radius:50px;padding:3px 9px;font-size:11px;font-weight:800;z-index:2;}
.badge-oferta{background:var(--rojo);color:white;}
.badge-popular{background:var(--naranja);color:white;}
.badge-recomendado{background:var(--verde);color:white;}
.badge-combo{background:#7b2ff7;color:white;}
.badge-hoy{background:linear-gradient(90deg,#e63946,#ff6b2b);color:white;}
.cat-badge{position:absolute;top:8px;right:8px;background:var(--amarillo);color:var(--oscuro);border-radius:50px;padding:2px 8px;font-size:10px;font-weight:700;z-index:2;}
/* 4. PEDIR RÁPIDO btn */
.add-btn{background:var(--oscuro);color:white;border:none;border-radius:50px;padding:8px 14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;width:100%;margin-top:auto;}
.quick-btn{background:var(--rojo);color:white;border:none;border-radius:50px;padding:6px 10px;font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;cursor:pointer;width:100%;margin-top:4px;}
/* 7. AGOTADO */
.agotado-badge{background:#555;color:white;border:none;border-radius:50px;padding:8px 14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;width:100%;margin-top:auto;text-align:center;opacity:0.8;}
.qty-ctrl{display:flex;align-items:center;gap:8px;width:100%;justify-content:center;margin-top:auto;}
.qty-btn{background:var(--gris);border:none;border-radius:50%;width:30px;height:30px;font-size:18px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qty-btn:active{background:var(--amarillo);}
.qty-num{font-weight:800;font-size:16px;min-width:20px;text-align:center;}
.variants-label{font-size:11px;font-weight:700;color:var(--subtext);}
.variants-list{display:flex;flex-wrap:wrap;gap:4px;}
.variant-chip{padding:3px 9px;border:2px solid var(--border);border-radius:50px;font-size:11px;font-weight:700;cursor:pointer;background:var(--card);color:var(--text);}
.variant-chip.selected{border-color:var(--rojo);background:#fff0f0;color:var(--rojo);}
.in-cart-badge{font-size:12px;font-weight:700;color:var(--verde);text-align:center;margin-top:auto;}
.cat-filter{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none;}
.cat-filter::-webkit-scrollbar{display:none;}
.cat-chip{flex-shrink:0;padding:7px 14px;border-radius:50px;border:2px solid var(--border);background:var(--card);color:var(--subtext);font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;}
.cat-chip.active{border-color:var(--rojo);background:var(--rojo);color:white;}
.empty{text-align:center;padding:40px 20px;color:var(--subtext);}
.empty-icon{font-size:60px;margin-bottom:12px;}
.cart-item{background:var(--card);border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px;box-shadow:var(--sombra);margin-bottom:10px;}
.cart-item .thumb{width:48px;height:48px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.cart-item .cemoji{font-size:28px;flex-shrink:0;}
.cart-item .info{flex:1;min-width:0;}
.cart-item .info .name{font-weight:700;font-size:13px;}
.cart-item .info .variant{font-size:11px;color:var(--subtext);}
.cart-item .info .price{color:var(--rojo);font-weight:700;font-size:13px;}
.cart-total{background:var(--oscuro);color:white;border-radius:16px;padding:18px;margin:14px 0;text-align:center;}
.cart-total .label{font-size:13px;opacity:0.7;}
.cart-total .amount{font-family:'Bebas Neue',sans-serif;font-size:42px;color:var(--amarillo);letter-spacing:2px;}
.delivery-options{display:flex;gap:10px;margin:12px 0;}
.delivery-opt{flex:1;padding:12px;border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;font-weight:700;font-size:14px;background:var(--card);color:var(--text);}
.delivery-opt.selected{border-color:var(--rojo);background:#fff0f0;color:var(--rojo);}
.delivery-opt .icon{font-size:26px;display:block;margin-bottom:4px;}
.zona-chip{flex:1;padding:10px;border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;font-weight:700;font-size:13px;background:var(--card);color:var(--text);transition:all 0.2s;}
.zona-chip.selected{border-color:var(--verde);background:#e8f5e9;color:#1b5e20;}
.metodo-chip{flex:1;padding:10px;border:2px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;font-weight:700;font-size:13px;background:var(--card);color:var(--text);}
.metodo-chip.selected{border-color:var(--rojo);background:#fff0f0;color:var(--rojo);}
.customer-info input,.customer-info select{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;margin-bottom:10px;outline:none;background:var(--bg);color:var(--text);}
.customer-info input:focus,.customer-info select:focus{border-color:var(--rojo);}
.customer-info input.field-error{border-color:var(--rojo);background:#fff5f5;}
.whatsapp-btn{background:#25d366;color:white;border:none;border-radius:14px;padding:16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;cursor:pointer;width:100%;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;transition:opacity 0.3s;}
.whatsapp-btn:disabled{background:#aaa;cursor:not-allowed;opacity:0.7;}
.comprobante-area{width:100%;height:110px;border:2px dashed var(--amarillo);border-radius:14px;background:#fff8e1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-weight:700;color:#999;font-size:13px;overflow:hidden;cursor:pointer;}
.pago-card{background:#fff8e1;border:2px solid var(--amarillo);border-radius:14px;padding:14px;margin-top:12px;}
.instruc-card{border-radius:14px;padding:14px;margin-top:10px;}
.geo-required{border:2px solid var(--verde);border-radius:12px;padding:12px;background:#e8f5e9;margin-bottom:10px;}
.geo-required.geo-ok{background:#e8f5e9;border-color:#2dc653;}
.geo-required.geo-pending{background:#fff8e1;border-color:#f4d35e;}
.ux-info-bar{background:linear-gradient(90deg,#e8f5e9,#fff8e1);border:1px solid #ddd;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;color:#555;text-align:center;margin-bottom:10px;}
/* 2. PEDIDO MÍNIMO bar */
.minimo-bar{border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;text-align:center;margin-bottom:8px;}
.minimo-ok{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7;}
.minimo-nok{background:#fff3cd;color:#856404;border:1px solid #ffd54f;}
/* 14. SOPORTE */
.soporte-form{background:var(--card);border-radius:16px;padding:18px;box-shadow:var(--sombra);}
.soporte-form select,.soporte-form textarea,.soporte-form input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;margin-bottom:10px;outline:none;background:var(--bg);color:var(--text);}
.soporte-form textarea{min-height:90px;resize:none;}
.soporte-btn{background:var(--rojo);color:white;border:none;border-radius:12px;padding:14px;width:100%;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;cursor:pointer;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--oscuro);color:white;padding:12px 24px;border-radius:50px;font-weight:700;font-size:14px;z-index:999;transition:transform 0.3s;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.zoom-modal{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.zoom-modal img{max-width:100%;max-height:65vh;border-radius:16px;object-fit:contain;}
.zoom-emoji{font-size:110px;}
.zoom-name{color:white;font-weight:800;font-size:18px;margin-top:14px;text-align:center;}
.zoom-price{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--amarillo);margin-top:2px;}
.zoom-close{margin-top:18px;background:white;border:none;border-radius:50px;padding:12px 30px;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;cursor:pointer;}
@media(max-width:400px){.products-grid{grid-template-columns:repeat(2,1fr);}.logo{font-size:22px;}}
/* 5. BARRA FLOTANTE CARRITO */
.floating-cart{position:fixed;bottom:0;left:0;right:0;z-index:300;padding:10px 16px;background:var(--oscuro);display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:0 -4px 20px rgba(0,0,0,0.25);transform:translateY(100%);transition:transform 0.3s;padding-bottom:max(10px,env(safe-area-inset-bottom));}
.floating-cart.visible{transform:translateY(0);}
.floating-cart-info{flex:1;}
.floating-cart-total{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--amarillo);letter-spacing:1px;}
.floating-cart-label{font-size:11px;color:#aaa;}
.floating-cart-btn{background:var(--rojo);color:white;border:none;border-radius:50px;padding:12px 22px;font-family:'Nunito',sans-serif;font-weight:800;font-size:14px;cursor:pointer;white-space:nowrap;}
/* Espacio para barra flotante */
body.has-float-bar .view{padding-bottom:70px;}
/* 2. UPSELL */
.upsell-section{background:linear-gradient(135deg,#fff8e1,#fff3e0);border:2px solid var(--amarillo);border-radius:14px;padding:14px;margin-top:12px;}
.upsell-title{font-size:13px;font-weight:800;color:#856404;margin-bottom:10px;}
.upsell-scroll{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.upsell-scroll::-webkit-scrollbar{display:none;}
.upsell-card{flex-shrink:0;width:120px;background:white;border-radius:12px;padding:8px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.upsell-card .uemoji{font-size:28px;}
.upsell-card .uname{font-size:11px;font-weight:700;color:var(--text);margin:4px 0 2px;line-height:1.2;}
.upsell-card .uprice{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--rojo);}
.upsell-card .uadd{background:var(--oscuro);color:white;border:none;border-radius:50px;padding:4px 10px;font-size:11px;font-weight:800;cursor:pointer;margin-top:4px;width:100%;}
/* 3. REPETIR PEDIDO */
.repeat-bar{background:linear-gradient(90deg,#1a1a2e,#2a2a4e);border-radius:14px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
.repeat-bar-info{color:white;}
.repeat-bar-label{font-size:12px;opacity:0.7;}
.repeat-bar-btn{background:var(--amarillo);color:var(--oscuro);border:none;border-radius:50px;padding:8px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap;}
/* NUEVAS MEJORAS */
/* Banner tienda abierta/cerrada mejorado */
.tienda-status-bar{text-align:center;padding:10px 16px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;}
.tienda-abierta{background:linear-gradient(90deg,#2dc653,#1a9e3f);color:white;}
.tienda-cerrada{background:linear-gradient(90deg,#e63946,#c1121f);color:white;}
/* Envío gratis dinámico */
.envio-progress{height:4px;background:rgba(255,255,255,0.3);border-radius:2px;margin-top:4px;}
.envio-progress-bar{height:100%;background:white;border-radius:2px;transition:width 0.3s;}
/* Stock badge */
.stock-badge{font-size:10px;font-weight:700;color:var(--naranja);margin-top:2px;}
/* Compartir producto */
.share-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:2px 4px;opacity:0.6;}
.share-btn:active{opacity:1;}
/* Historial pedidos */
.historial-card{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--sombra);margin-bottom:10px;}
.historial-estado{font-size:11px;font-weight:800;padding:3px 9px;border-radius:50px;}
/* Cupones */
.cupon-input-wrap{display:flex;gap:8px;margin-bottom:10px;}
.cupon-input-wrap input{flex:1;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;background:var(--bg);color:var(--text);}
.cupon-input-wrap input:focus{border-color:var(--amarillo);}
.cupon-btn{background:var(--amarillo);color:var(--oscuro);border:none;border-radius:10px;padding:10px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;white-space:nowrap;}
.cupon-ok{background:#e8f5e9;border:2px solid var(--verde);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;color:#1b5e20;margin-bottom:8px;}
/* Puntos */
.puntos-bar{background:linear-gradient(90deg,#7b2ff7,#5c1dc4);color:white;border-radius:12px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.puntos-num{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Bodega <span>Tony</span> Tony</div>
    <div style="font-size:11px;color:#aaa;margin-top:1px;">🛒 Haz tu pedido aquí</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="dark-btn" id="darkBtn" onclick="toggleDark()">🌙</button>
    <button class="cart-btn" onclick="showTab('carrito')">
      🛒 <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<div class="tienda-cerrada-bar" id="tierraCerradaBar">⏰ Estamos cerrados. Vuelve en horario de atención</div>
<div class="envio-bar" id="envioBar">🛵 Domicilio gratis</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('tienda')" id="tab-tienda">🏪 Tienda</button>
  <button class="tab-btn" onclick="showTab('carrito')" id="tab-carrito">🛒 Mi Pedido</button>
  <button class="tab-btn" onclick="showTab('historial')" id="tab-historial">📋 Mis Pedidos</button>
  <button class="tab-btn" onclick="showTab('soporte')" id="tab-soporte">❗ Soporte</button>
</div>

<div class="search-wrap" id="searchWrap">
  <input type="text" id="searchInput" placeholder="Buscar producto..." oninput="renderStore()">
</div>

<div class="view active" id="view-tienda"><div id="storeContainer"></div></div>
<div class="view" id="view-carrito"><div id="cartContainer"></div></div>
<div class="view" id="view-historial"><div id="historialContainer"></div></div>
<div class="view" id="view-soporte"><div id="soporteContainer"></div></div>

<!-- 5. BARRA FLOTANTE -->
<div class="floating-cart" id="floatingCart">
  <div class="floating-cart-info">
    <div class="floating-cart-label">Tu pedido</div>
    <div class="floating-cart-total" id="floatTotal">$ 0.00</div>
  </div>
  <button class="floating-cart-btn" onclick="showTab('carrito')">Ver pedido 🛒</button>
</div>

<div class="toast" id="toast"></div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBdv2cOMgbeBuW-V9Buz8EzGAoElnvySoI",
  authDomain:"bodegatonytony.firebaseapp.com",
  projectId:"bodegatonytony",
  storageBucket:"bodegatonytony.firebasestorage.app",

  appId:"1:763208241886:web:dd4a04d68c2c72ed24a84f"
});
const db = firebase.firestore();

// ── ESTADO GLOBAL ──
let products       = [];
let cart           = {};
let deliveryType   = 'domicilio';
let selectedCategory = 'Todos';
let comprobanteBase64 = '';
let darkMode       = localStorage.getItem('darkMode') === '1';
let config         = {
  whatsapp: '+584242520138',

function applyDark() {
  document.body.classList.toggle('dark', darkMode);

// ── HORARIO ──
function tiendaAbierta() {
  const h = config.horario || { apertura: 0, cierre: 24 };
  const hora = new Date().getHours();
  if (h.apertura < h.cierre) return hora >= h.apertura && hora < h.cierre;
  return hora >= h.apertura || hora < h.cierre;
}
function horarioTexto() {
  const h = config.horario || { apertura: 10, cierre: 22 };
  function fmt(n) {
    const v = Number(n);
    if (v === 0) return '12:00 AM';
    if (v < 12)  return `${String(v).padStart(2,'0')}:00 AM`;
    if (v === 12) return '12:00 PM';
    return `${String(v-12).padStart(2,'0')}:00 PM`;
  }
  return `${fmt(h.apertura)} - ${fmt(h.cierre)}`;
}
function actualizarBannerHorario() {
  const bar = document.getElementById('tierraCerradaBar');
  if (!bar) return;
  if (!tiendaAbierta()) {
    bar.textContent = `⏰ Estamos cerrados. Horario: ${horarioTexto()}`;
    bar.style.display = 'block';
  } else {
    bar.style.display = 'none';
  }
}

// ── CART HELPERS ──
function cartKey(pid, variant) { return pid + '_' + (variant || ''); }
function getQty(pid, variant)  { return (cart[cartKey(pid, variant)] || {}).qty || 0; }
function totalQtyForProduct(pid) {
  return Object.keys(cart).filter(k => k.startsWith(pid + '_')).reduce((s, k) => s + cart[k].qty, 0);
}
function cartTotal() { return Object.values(cart).reduce((s, i) => s + i.product.price * i.qty, 0); }

// ── TABS ──
function showTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('searchWrap').style.display = tab === 'tienda' ? 'block' : 'none';
  if (tab === 'tienda')   renderStore();
  if (tab === 'carrito')  renderCart();
  if (tab === 'soporte')  renderSoporte();
}

// ── STORE ──
function renderStore() {
  const container = document.getElementById('storeContainer');
  if (products.length === 0) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">🏪</div><p>¡Pronto hay productos!</p></div>`;
    updateCartCount(); return;
  }
  const searchQ   = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  const badgeLabel = { oferta:'🔥 Oferta', popular:'⭐ Popular', recomendado:'👍 Recomendado', combo:'📦 Combo', hoy:'⏰ Oferta por hoy' };
  const ofertas   = products.filter(p => p.oferta && !searchQ);
  const populares = products.filter(p => p.etiqueta === 'popular' && !searchQ);
  const allCats   = ['Todos', ...new Set(products.map(p => p.category || 'General'))];
  const catEmojis = {'Todos':'🏪','Víveres':'🌽','Refrescos':'🥤','Dulces':'🍬','Frescos':'🧀','Bebidas':'🍾','Higiene Personal':'🧴','Cabello':'💆','Limpieza del Hogar':'🧺','Bebé':'🍼','Papelería':'✏️','Farmacia':'💊','Varios':'💡','Panadería':'🍞','Combos':'📦'};

  let html = '';
  if (ofertas.length > 0 && !searchQ) {
    html += `<div class="ofertas-banner"><div><div class="title">🔥 Ofertas del día</div><div style="font-size:12px;opacity:0.9;">${ofertas.length} productos con descuento</div></div><div style="font-size:40px;">🏷️</div></div>`;
    html += `<div class="scroll-row">`;
    ofertas.forEach(p => { html += buildCard(p, badgeLabel, true); });
    html += `</div>`;
  }
  if (populares.length > 0 && !searchQ) {
    html += `<div class="section-title">⭐ Lo más vendido</div><div class="scroll-row">`;
    populares.forEach(p => { html += buildCard(p, badgeLabel, true); });
    html += `</div>`;
  }
  html += `<div class="cat-filter">`;
  allCats.forEach(c => { html += `<button class="cat-chip${selectedCategory===c?' active':''}" onclick="filterCat('${c}')">${catEmojis[c]||'📦'} ${c}</button>`; });
  html += `</div>`;

  const filtered = products.filter(p => {
    const matchCat    = selectedCategory === 'Todos' || (p.category || 'General') === selectedCategory;
    const matchSearch = !searchQ || p.name.toLowerCase().includes(searchQ) || (p.category||'').toLowerCase().includes(searchQ);
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🔍</div><p>No encontramos "${searchQ}"</p></div>`;
  } else {
    const cats = {};
    filtered.forEach(p => { const c = p.category||'General'; if (!cats[c]) cats[c]=[]; cats[c].push(p); });
    for (const cat in cats) {
      if (selectedCategory === 'Todos') html += `<div class="section-title">${catEmojis[cat]||'📦'} ${cat}</div>`;
      html += `<div class="products-grid">`;
      cats[cat].forEach(p => { html += buildCard(p, badgeLabel, false); });
      html += `</div>`;
    }
  }
  container.innerHTML = html;
  updateCartCount();
}

function buildCard(p, badgeLabel, isScroll) {
  const cls = isScroll ? 'oferta-card' : 'product-card';
  let badges = '';
  if (p.oferta) badges += `<span class="badge badge-oferta">🔥 Oferta</span>`;
  else if (p.etiqueta && badgeLabel[p.etiqueta]) badges += `<span class="badge badge-${p.etiqueta}">${badgeLabel[p.etiqueta]}</span>`;
  const imgHtml = p.photo
    ? `<img src="${p.photo}" class="product-img" onclick="zoomProduct('${p.photo}','${p.name.replace(/'/g,"\\'")}','${p.emoji||'📦'}',${p.price})" style="cursor:zoom-in;">`
    : `<div class="product-emoji-big" onclick="zoomProduct('','${p.name.replace(/'/g,"\\'")}','${p.emoji||'📦'}',${p.price})" style="cursor:pointer;">${p.emoji||'📦'}</div>`;
  const priceHtml = p.oferta && p.precioAnterior
    ? `<div class="price-old">$ ${p.precioAnterior}</div><div class="price-new">$ ${p.price}</div><div class="price-save">¡Ahorras $${(p.precioAnterior-p.price).toFixed(2)}!</div>`
    : `<div class="product-price">$ ${p.price}</div>`;
  return `<div class="${cls}">${badges}<span class="cat-badge">${p.category||'General'}</span>${imgHtml}<div class="product-info"><div class="product-name">${p.name}</div>${priceHtml}${buildActionHtml(p)}</div></div>`;
}

// 7. PRODUCTOS AGOTADOS + 4. PEDIR RÁPIDO
function buildActionHtml(p) {
  // 7. Si tiene campo agotado = true → mostrar badge agotado
  if (p.agotado) {
    return `<div class="agotado-badge">❌ Agotado</div>`;
  }
  const hasV = p.variants && p.variants.length > 0;
  const tQty = totalQtyForProduct(p.id);
  if (!hasV) {
    const qty = getQty(p.id, '');
    if (qty === 0) return `
      <button class="add-btn" onclick="addToCart('${p.id}','')">+ Agregar</button>
      <button class="quick-btn" onclick="pedidoRapido('${p.id}','')">⚡ Pedir rápido</button>`;
    return `<div class="qty-ctrl"><button class="qty-btn" onclick="changeQty('${p.id}','',-1)">−</button><span class="qty-num">${qty}</span><button class="qty-btn" onclick="changeQty('${p.id}','',1)">+</button></div>`;
  }
  let v = `<div class="variants-label">Elige:</div><div class="variants-list">`;
  p.variants.forEach(vr => {
    const qty = getQty(p.id, vr);
    v += `<span class="variant-chip${qty>0?' selected':''}" onclick="toggleVariant('${p.id}','${vr}')">${vr}${qty>0?' ×'+qty:''}</span>`;
  });
  v += `</div>`;
  if (tQty > 0) v += `<div class="in-cart-badge">✅ ${tQty} en carrito</div>`;
  return v;
}

function filterCat(cat) { selectedCategory = cat; renderStore(); }

// 4. PEDIR RÁPIDO
function pedidoRapido(pid, variant) {
  addToCart(pid, variant);
  showTab('carrito');
}

// ── CART ACTIONS ──
function toggleVariant(pid, variant) {
  getQty(pid, variant) === 0 ? addToCart(pid, variant) : changeQty(pid, variant, -getQty(pid, variant));
}
function addToCart(pid, variant) {
  const key = cartKey(pid, variant);
  const p = products.find(x => x.id === pid);
  if (!p) return;
  if (!cart[key]) cart[key] = { product: p, variant: variant || '', qty: 0 };
  cart[key].qty++;
  renderStore();
  showToast('✅ Agregado al carrito');
  updateEnvioBar();
}
function changeQty(pid, variant, delta) {
  const key = cartKey(pid, variant);
  if (!cart[key]) return;
  cart[key].qty += delta;
  if (cart[key].qty <= 0) delete cart[key];
  renderStore();
  updateEnvioBar();
}
function updateCartCount() {
  document.getElementById('cartCount').textContent = Object.values(cart).reduce((a, b) => a + b.qty, 0);
}
function updateEnvioBar() {
  const bar = document.getElementById('envioBar');
  bar.textContent = config.envioGratis ? '🛵 Domicilio gratis' : '🛵 Domicilio disponible';
  bar.style.background = 'linear-gradient(90deg,#2dc653,#1a9e3f)';
  updateCartCount();
}

// ── GEOLOCALIZACIÓN ──
function getLocation() {
  if (!navigator.geolocation) { showToast('⚠️ Tu navegador no soporta geolocalización'); return; }
  showToast('📍 Obteniendo ubicación...');
  navigator.geolocation.getCurrentPosition(pos => {
    clienteGeo = { lat: pos.coords.latitude, lng: pos.coords.longitude };
    const geoEl = document.getElementById('geoStatus');
    if (geoEl) {
      geoEl.className = 'geo-required geo-ok';
      geoEl.innerHTML = `✅ Ubicación obtenida · <a href="https://maps.google.com/?q=${clienteGeo.lat},${clienteGeo.lng}" target="_blank" style="color:#1b5e20;">Ver en mapa</a>`;
    }
    showToast('✅ Ubicación capturada');
    if (zonas.length > 0 && !selectedZona) {
      selectedZona = zonas[0];
      renderCart();
      showToast(`🗺️ Zona asignada: ${selectedZona.nombre}`);
    }
  }, () => {
    showToast('❌ No se pudo obtener la ubicación');
    const geoEl = document.getElementById('geoStatus');
    if (geoEl) { geoEl.className = 'geo-required geo-pending'; geoEl.textContent = '⚠️ Ubicación no obtenida. Intenta de nuevo.'; }
  });
}

// ── ZOOM ──
function zoomProduct(photo, name, emoji, price) {
  const d = document.createElement('div');

  d.innerHTML = `${photo?`<img src="${photo}" alt="${name}">`:`<div class="zoom-emoji">${emoji}</div>`}<div class="zoom-name">${name}</div><div class="zoom-price">$ ${price}</div><button class="zoom-close" onclick="this.parentElement.remove()">✕ Cerrar</button>`;
  d.onclick = e => { if (e.target === d) d.remove(); };

// ── ENVIAR PEDIDO ──
function sendOrder() {
  // 1. HORARIO
  if (!tiendaAbierta()) { showToast(`⏰ Estamos cerrados. Vuelve en horario de atención`); return; }

  // VALIDACIONES
  const name    = document.getElementById('custName')?.value.trim();
  const phone   = document.getElementById('custPhone')?.value.trim();
  const address = document.getElementById('custAddress')?.value.trim();
  if (!name)  { marcarError('custName');  showToast('⚠️ Falta tu nombre');    return; }
  if (!phone) { marcarError('custPhone'); showToast('⚠️ Falta tu teléfono');  return; }
  if (deliveryType === 'domicilio' && !address)  { marcarError('custAddress'); showToast('⚠️ Falta tu dirección'); return; }
  if (deliveryType === 'domicilio' && !clienteGeo) { showToast('📍 Activa tu ubicación GPS para continuar'); return; }
  // 6. ZONA OBLIGATORIA
  if (deliveryType === 'domicilio' && zonas.length > 0 && !selectedZona) { showToast('🗺️ Selecciona tu zona de entrega'); return; }
  if (!selectedMetodo) { showToast('⚠️ Selecciona método de pago'); return; }
  if (deliveryType === 'recoger' && !comprobanteBase64) { showToast('⚠️ Sube tu comprobante de pago'); return; }

  // 2. PEDIDO MÍNIMO
  const costoEnvio = selectedZona ? (selectedZona.costo || 0) : 0;
  let total = 0, productosMsg = '';
  Object.values(cart).forEach(item => {
    const sub = item.product.price * item.qty;
    total += sub;
    productosMsg += `  ${item.product.emoji||'📦'} ${item.product.name}${item.variant?' ('+item.variant+')':''} × ${item.qty} — $${sub.toFixed(2)}\n`;
  });
  const totalFinal = total + costoEnvio;
  if (config.pedidoMinimo > 0 && totalFinal < config.pedidoMinimo) {
    showToast(`💰 Mínimo $${config.pedidoMinimo}. Faltan $${(config.pedidoMinimo - totalFinal).toFixed(2)}`);
    return;
  }

  localStorage.setItem('clientName', name);
  localStorage.setItem('clientPhone', phone);
  if (address) localStorage.setItem('clientAddress', address);

  const tiempo     = config.tiempoPreparacion || 30;
  const metodosLbl = { efectivo:'💵 Efectivo', pagoMovil:'📱 Pago Móvil', transferencia:'🏦 Transferencia' };

  // 3. MENSAJE WHATSAPP MEJORADO
  let msg = `🛒 *Pedido recibido - Bodega Tony Tony*\n`;
  msg += `🕒 *Tiempo estimado: ${tiempo} min*\n`;
  msg += `📍 Te avisaremos cuando salga\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n`;
  msg += `👤 *Cliente:* ${name}\n`;
  msg += `📞 *Teléfono:* ${phone}\n`;
  if (deliveryType === 'domicilio') {
    msg += `📍 *Entrega:* 🛵 Domicilio\n`;
    msg += `📌 *Dirección:* ${address}\n`;
    if (selectedZona) msg += `🗺️ *Zona:* ${selectedZona.nombre}\n`;
    if (clienteGeo)   msg += `📡 *Ubicación:* https://maps.google.com/?q=${clienteGeo.lat},${clienteGeo.lng}\n`;
  } else {
    msg += `📍 *Entrega:* 🏪 Pasa a recoger\n`;
  }
  msg += `💳 *Pago:* ${metodosLbl[selectedMetodo]||selectedMetodo}\n`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n`;
  msg += `🧺 *Productos:*\n${productosMsg}`;
  msg += `━━━━━━━━━━━━━━━━━━━━\n`;
  msg += costoEnvio > 0
    ? `💰 *Subtotal: $${total.toFixed(2)}*\n🛵 *Envío: $${costoEnvio.toFixed(2)}*\n💰 *TOTAL: $${totalFinal.toFixed(2)}*\n`
    : `🛵 *Envío: Gratis*\n💰 *TOTAL: $${totalFinal.toFixed(2)}*\n`;
  if (deliveryType === 'recoger') msg += `\n📎 _(Comprobante adjunto)_`;

  // GUARDAR PEDIDO
  db.collection('pedidos').add({
    nombre: name, telefono: phone, entrega: deliveryType, direccion: address||'',
    zona: selectedZona ? selectedZona.nombre : '', costoEnvio,
    metodoPago: selectedMetodo, productos: productosMsg, total: totalFinal,
    comprobante: comprobanteBase64||'', geo: clienteGeo,
    fecha: new Date().toISOString(),
    estado: 'confirmado',
    fechaConfirmacion: new Date().toISOString(),
    tiempoEstimado: tiempo,
    repartidor: { nombre: '', telefono: '', estado: 'pendiente' },
    nombreRepartidor: '', telefonoRepartidor: '',
  }).then(ref => { escucharPedido(ref.id); });

  window.open(`https://wa.me/${config.whatsapp}?text=${encodeURIComponent(msg)}`, '_blank');

  // 13. PANTALLA CONFIRMACIÓN
  setTimeout(() => {
    document.getElementById('cartContainer').innerHTML = `
      <div style="text-align:center;padding:30px 20px;">
        <div style="font-size:60px;margin-bottom:12px;">✅</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--text);margin-bottom:6px;">¡Pedido enviado correctamente!</div>
        <div style="font-size:15px;font-weight:700;color:var(--verde);margin-bottom:16px;">🕒 En preparación · ${tiempo} min estimado</div>
        <div style="font-size:13px;color:var(--subtext);margin-bottom:16px;">${deliveryType==='domicilio'?'Realiza tu pago y envíanos el comprobante 📸':'Espera confirmación para pasar a recoger 🏪'}</div>
        ${deliveryType==='domicilio'?`<div class="pago-card" style="text-align:left;margin-bottom:16px;"><div style="font-weight:800;font-size:15px;margin-bottom:8px;">💳 Pago Móvil</div><div style="font-size:14px;line-height:2;">🏦 <b>${config.pagoMovil.banco}</b><br>👤 <b>${config.pagoMovil.nombre}</b><br>🪪 <b>C.I:</b> ${config.pagoMovil.cedula}<br>📱 <b>${config.pagoMovil.telefono}</b></div></div><a href="https://wa.me/${config.whatsapp}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:10px;background:#25d366;color:white;border:none;border-radius:14px;padding:16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:16px;text-decoration:none;margin-bottom:12px;">📎 Enviar comprobante</a>`:''}
        <button onclick="cart={};comprobanteBase64='';clienteGeo=null;updateCartCount();showTab('tienda')" style="background:var(--rojo);color:white;border:none;border-radius:14px;padding:14px;width:100%;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;cursor:pointer;">Hacer otro pedido</button>
      </div>`;
    cart = {}; comprobanteBase64 = ''; clienteGeo = null; updateCartCount();
  }, 400);
}

function marcarError(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.add('field-error'); el.focus();
  setTimeout(() => el.classList.remove('field-error'), 2000);
}

function escucharPedido(pedidoId) {
  if (pedidoActivoUnsub) pedidoActivoUnsub();
  pedidoActivoUnsub = db.collection('pedidos').doc(pedidoId).onSnapshot(snap => {
    if (!snap.exists) return;
    const estado = snap.data().estado;
    if (estado === 'en_camino' || estado === 'camino') showToast('🛵 Tu pedido va en camino');
    if (estado === 'preparando' || estado === 'preparacion') showToast('👨‍🍳 Tu pedido está en preparación');
    if (estado === 'entregado') showToast('📦 ¡Tu pedido fue entregado!');
  });
}

async function enviarSoporte() {

// ── ENVÍO GRATIS DINÁMICO ──
function updateEnvioBarDinamico() {
  const bar = document.getElementById('envioBar');
  if (!bar) return;
  if (config.envioGratis) {
    bar.innerHTML = '🛵 Domicilio gratis';
    bar.style.background = 'linear-gradient(90deg,#2dc653,#1a9e3f)';
    updateCartCount();
    return;
  }
  const montoEnvioGratis = config.montoEnvioGratis || 0;
  const total = cartTotal();
  if (montoEnvioGratis > 0) {
    const pct = Math.min(100, (total / montoEnvioGratis) * 100);
    if (total >= montoEnvioGratis) {
      bar.innerHTML = '🎉 ¡Envío gratis desbloqueado!';
      bar.style.background = 'linear-gradient(90deg,#2dc653,#1a9e3f)';
    } else {
      const faltan = (montoEnvioGratis - total).toFixed(2);
      bar.innerHTML = `🛵 Agrega $${faltan} más para envío gratis <div class="envio-progress"><div class="envio-progress-bar" style="width:${pct}%"></div></div>`;
      bar.style.background = 'linear-gradient(90deg,#ff6b2b,#e63946)';
    }
  } else {
    bar.innerHTML = '🛵 Domicilio disponible';
    bar.style.background = 'linear-gradient(90deg,#2dc653,#1a9e3f)';
  }
  updateCartCount();
}

  let html = _buildCardOrig(p, badgeLabel, isScroll);

  const stockHtml = p.stock != null && p.stock <= 5 && p.stock > 0

};

      let html = `<div style="font-family:'Bebas Neue',sans-serif;font-size:22px;margin-bottom:14px;border-left:4px solid var(--rojo);padding-left:10px;">📋 Mis Pedidos</div>`;
      snap.docs.forEach(doc => {
        const p = doc.data();
        const fecha = new Date(p.fecha).toLocaleString('es-VE',{dateStyle:'short',timeStyle:'short'});
        const estado = p.estado || 'pendiente';
        html += `<div class="historial-card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <div style="font-weight:800;font-size:14px;">🗓️ ${fecha}</div>
            <span class="historial-estado" style="background:${estadoBg[estado]||'#fff3cd'};color:${estadoColor[estado]||'#856404'};">${estadoMap[estado]||estado}</span>
          </div>
          <div style="font-size:13px;white-space:pre-line;color:var(--subtext);margin-bottom:8px;">${p.productos}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--rojo);">$ ${p.total?.toFixed(2)||'0.00'}</div>
            <button onclick="repetirDesdeHistorial('${doc.id}')" style="background:var(--oscuro);color:white;border:none;border-radius:50px;padding:6px 14px;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;">🔁 Repetir</button>
          </div>
        </div>`;
      });
      container.innerHTML = html;
    })
    .catch(() => { container.innerHTML = `<div class="empty"><div class="empty-icon">❌</div><p>Error al cargar pedidos</p></div>`; });
}

function repetirDesdeHistorial(pedidoId) {
  db.collection('pedidos').doc(pedidoId).get().then(snap => {
    if (!snap.exists) return;
    const data = snap.data();
    // Parsear productos del texto
    const lineas = (data.productos || '').split('\n').filter(l => l.trim());
    let agregados = 0;
    lineas.forEach(linea => {
      const match = linea.match(/([^\s]+)\s+(.+?)\s+×\s+(\d+)/);
      if (!match) return;
      const nombreBusca = match[2].replace(/\(.*\)/, '').trim();
      const qty = parseInt(match[3]) || 1;
      const p = products.find(x => x.name.includes(nombreBusca) && !x.agotado);
      if (!p) return;
      const key = cartKey(p.id, '');
      if (!cart[key]) cart[key] = { product: p, variant: '', qty: 0 };
      cart[key].qty += qty;
      agregados++;
    });
    if (agregados === 0) { showToast('⚠️ Productos no disponibles'); return; }
    showToast(`🔁 ${agregados} producto(s) agregados`);
    actualizarFloatingCart();
    showTab('carrito');
  });
}

// ── CUPONES DE DESCUENTO ──
let cuponActivo = null;

async function aplicarCupon() {
  const codigo = document.getElementById('cuponInput')?.value.trim().toUpperCase();
  if (!codigo) { showToast('⚠️ Escribe un código'); return; }
  try {
    const snap = await db.collection('cupones').where('codigo','==',codigo).where('activo','==',true).get();
    if (snap.empty) { showToast('❌ Cupón inválido o expirado'); cuponActivo = null; renderCart(); return; }
    const cupon = { id: snap.docs[0].id, ...snap.docs[0].data() };
    // Validar fecha expiración
    if (cupon.expira && new Date(cupon.expira) < new Date()) { showToast('❌ Cupón expirado'); cuponActivo = null; renderCart(); return; }
    cuponActivo = cupon;
    showToast(`✅ Cupón aplicado: ${cupon.descuento}% de descuento`);
    renderCart();
  } catch(e) { showToast('⚠️ Error al verificar cupón'); }
}

function calcularDescuentoCupon(total) {
  if (!cuponActivo) return 0;
  if (cuponActivo.tipo === 'porcentaje') return total * (cuponActivo.descuento / 100);
  if (cuponActivo.tipo === 'fijo') return Math.min(cuponActivo.descuento, total);
  return 0;
}

// ── PROGRAMA DE PUNTOS ──
function getPuntos() { try { return parseInt(localStorage.getItem('puntos') || '0'); } catch { return 0; } }
function sumarPuntos(total) {
  const puntosGanados = Math.floor(total); // 1 punto por cada $1
  const actuales = getPuntos() + puntosGanados;
  localStorage.setItem('puntos', actuales);
  return puntosGanados;
}
function getPuntosInfo() {
  const p = getPuntos();
  return { puntos: p, proximoNivel: p < 50 ? 50 : p < 100 ? 100 : p < 200 ? 200 : null, nivel: p >= 200 ? '🥇 VIP' : p >= 100 ? '🥈 Premium' : p >= 50 ? '🥉 Regular' : '⭐ Nuevo' };
}

const _sendOrderOrigNew = sendOrder;
sendOrder = function() {

// ── 1. HORARIO MEJORADO CON MINUTOS ──
// Sobrescribe tiendaAbierta para soportar horas+minutos si config.horario tiene minutosApertura/minutosCierre
function tiendaAbiertoExtendido() {
  const h    = config.horario || { apertura: 0, cierre: 24 };
  const ahora = new Date();
  const totalMin = ahora.getHours() * 60 + ahora.getMinutes();
  const aperMin  = (h.apertura || 0) * 60 + (h.minutosApertura || 0);
  const cierreMin = (h.cierre   || 24) * 60 + (h.minutosCierre  || 0);
  if (aperMin < cierreMin) return totalMin >= aperMin && totalMin < cierreMin;
  return totalMin >= aperMin || totalMin < cierreMin; // nocturno
}
// Patch: usar versión extendida si tiene minutos, sino la existente
const _tiendaAbiertaOrig = tiendaAbierta;
tiendaAbierta = function() {
  const h = config.horario || {};
  if (h.minutosApertura != null || h.minutosCierre != null) return tiendaAbiertoExtendido();
  return _tiendaAbiertaOrig();
};

// ── 2. UPSELL — sugerencias al agregar producto ──
let upsellTimeout = null;
function mostrarUpsell(pid) {
  // Buscar hasta 3 productos de la misma categoría o populares, excluyendo el actual
  const p = products.find(x => x.id === pid);
  if (!p) return;
  const sugeridos = products.filter(x =>
    x.id !== pid && !x.agotado && x.visible !== false &&
    ((x.category === p.category) || x.etiqueta === 'popular')
  ).slice(0, 3);
  if (sugeridos.length === 0) return;
  // Insertar sección upsell en la tienda si no existe
  let upsellEl = document.getElementById('upsellSection');
  if (!upsellEl) {
    upsellEl = document.createElement('div');
    upsellEl.id = 'upsellSection';
    upsellEl.className = 'upsell-section';
    const container = document.getElementById('storeContainer');
    if (container) container.prepend(upsellEl);
  }
  upsellEl.innerHTML = `<div class="upsell-title">🔥 Combínalo con…</div>
    <div class="upsell-scroll">
      ${sugeridos.map(s => `
        <div class="upsell-card">
          <div class="uemoji">${s.photo ? `<img src="${s.photo}" style="width:40px;height:40px;border-radius:8px;object-fit:cover;">` : (s.emoji||'📦')}</div>
          <div class="uname">${s.name}</div>
          <div class="uprice">$ ${s.price}</div>
          <button class="uadd" onclick="addToCart('${s.id}','');mostrarUpsell('${s.id}')">+ Agregar</button>
        </div>`).join('')}
    </div>`;
  clearTimeout(upsellTimeout);
  upsellTimeout = setTimeout(() => { if (upsellEl) upsellEl.remove(); }, 8000);
}

// Patch addToCart para mostrar upsell
const _addToCartOrig = addToCart;
addToCart = function(pid, variant) {
  _addToCartOrig(pid, variant);
  // Solo mostrar upsell si estamos en la tienda y el carrito tiene 1+ items
  if (document.getElementById('view-tienda')?.classList.contains('active')) {
    mostrarUpsell(pid);
  }
  actualizarFloatingCart();
};

// Patch changeQty para actualizar barra flotante
const _changeQtyOrig = changeQty;
changeQty = function(pid, variant, delta) {
  _changeQtyOrig(pid, variant, delta);
  actualizarFloatingCart();
};

// ── 3. REPETIR PEDIDO ──
function guardarUltimoPedido(cartData) {
  try {
    const resumen = Object.values(cartData).map(i => ({
      pid: i.product.id, name: i.product.name, emoji: i.product.emoji||'📦',
      price: i.product.price, variant: i.variant, qty: i.qty
    }));
    localStorage.setItem('ultimoPedido', JSON.stringify(resumen));
  } catch(e) {}
}

function repetirPedido() {
  try {
    const resumen = JSON.parse(localStorage.getItem('ultimoPedido') || '[]');
    if (!resumen.length) { showToast('No hay pedido anterior guardado'); return; }
    let agregados = 0;
    resumen.forEach(item => {
      const p = products.find(x => x.id === item.pid);
      if (!p || p.agotado) return;
      const key = cartKey(item.pid, item.variant);
      if (!cart[key]) cart[key] = { product: p, variant: item.variant || '', qty: 0 };
      cart[key].qty += item.qty;
      agregados++;
    });
    if (agregados === 0) { showToast('⚠️ Los productos ya no están disponibles'); return; }
    renderStore();
    actualizarFloatingCart();
    showToast(`🔁 ${agregados} producto(s) agregados al carrito`);
    showTab('carrito');
  } catch(e) { showToast('No se pudo repetir el pedido'); }
}

function tieneUltimoPedido() {
  try { return JSON.parse(localStorage.getItem('ultimoPedido') || '[]').length > 0; } catch { return false; }
}

// ── 4. RANGO DE TIEMPO ESTIMADO ──
function tiempoRango() {
  const t = config.tiempoPreparacion || 30;
  return `${t}–${t + 10} min`;
}

// ── 5. BARRA FLOTANTE CARRITO ──
function actualizarFloatingCart() {
  const total = cartTotal();
  const items = Object.values(cart).reduce((a, b) => a + b.qty, 0);
  const bar = document.getElementById('floatingCart');
  const totalEl = document.getElementById('floatTotal');
  if (!bar) return;
  if (items > 0) {
    bar.classList.add('visible');
    document.body.classList.add('has-float-bar');
    if (totalEl) {
      const costoEnvio = selectedZona ? (selectedZona.costo || 0) : 0;
      totalEl.textContent = `$ ${(total + costoEnvio).toFixed(2)} · ${items} item${items>1?'s':''}`;
    }
  } else {
    bar.classList.remove('visible');
    document.body.classList.remove('has-float-bar');
  }
  updateCartCount();
}

// ── 8. MOSTRAR/OCULTAR AGOTADOS ──
let mostrarAgotados = true;
function toggleMostrarAgotados() {
  mostrarAgotados = !mostrarAgotados;
  renderStore();
  showToast(mostrarAgotados ? '👁️ Mostrando agotados' : '🙈 Ocultando agotados');
}

// Patch renderStore para respetar mostrarAgotados y agregar botón "Repetir pedido"
const _renderStoreOrig = renderStore;
renderStore = function() {
  // Filtrar agotados según preferencia
  if (!mostrarAgotados) {
    const orig = products;
    products = products.filter(p => !p.agotado);
    _renderStoreOrig();
    products = orig;
  } else {
    _renderStoreOrig();
  }
  // Agregar barra repetir pedido si hay pedido previo
  if (tieneUltimoPedido()) {
    const container = document.getElementById('storeContainer');
    if (container && !document.getElementById('repeatBar')) {
      const resumen = JSON.parse(localStorage.getItem('ultimoPedido') || '[]');
      const bar = document.createElement('div');
      bar.id = 'repeatBar';
      bar.className = 'repeat-bar';
      bar.innerHTML = `<div class="repeat-bar-info"><div style="font-weight:800;font-size:14px;color:white;">🔁 Repetir pedido anterior</div><div class="repeat-bar-label">${resumen.length} producto(s) · Toca para cargar</div></div><button class="repeat-bar-btn" onclick="repetirPedido()">Repetir 🔁</button>`;
      container.prepend(bar);
    }
  }
  actualizarFloatingCart();
};

// ── PATCH sendOrder para guardar último pedido y usar tiempo rango ──
const _sendOrderOrig = sendOrder;
sendOrder = function() {
  // Guardar pedido actual antes de enviarlo
  guardarUltimoPedido(cart);
  _sendOrderOrig();
};

// Patch renderCart para usar rango de tiempo y botón ocultar agotados
const _renderCartOrig = renderCart;
renderCart = function() {
  _renderCartOrig();
  // Reemplazar texto de tiempo si existe en la barra UX

    uxBar.textContent = `✔ Pedido fácil y rápido · 🛵 Entrega en ${tiempoRango()}`;
  }

};

// Inicializar barra flotante al cargar
actualizarFloatingCart();
